      // ─── LOI DES SINUS ────────────────────────────────────────
      function renderSinus(panel) {
        const st = state.sinus;

        const ctrl = document.createElement("div");
        ctrl.className = "card";
        ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;
        ctrl.appendChild(
          slider("si_a", "Côté a", st.a, 1, 12, 0.5, (v) => {
            st.a = v;
            st.step = 0;
          }),
        );
        ctrl.appendChild(
          slider("si_A", "Angle A (°)", st.A, 5, 170, 1, (v) => {
            st.A = v;
            if (st.A + st.B >= 175) st.B = 174 - st.A;
            st.step = 0;
          }),
        );
        ctrl.appendChild(
          slider("si_B", "Angle B (°)", st.B, 5, 170, 1, (v) => {
            st.B = v;
            if (st.A + st.B >= 175) st.A = 174 - st.B;
            st.step = 0;
          }),
        );
        panel.appendChild(ctrl);

        const { a, A, B } = st;
        const Ar = deg(A),
          Br = deg(B);
        const C = 180 - A - B;
        if (C <= 0) {
          panel.appendChild(card("⚠️", "<p>A + B doit être < 180° !</p>"));
          return;
        }
        const Cr = deg(C);
        const b = round2((a * Math.sin(Br)) / Math.sin(Ar));
        const c = round2((a * Math.sin(Cr)) / Math.sin(Ar));
        const ratio = round2(a / Math.sin(Ar));

        panel.appendChild(
          bigVal([
            ["C = 180−A−B", `${C}°`, "#60a5fa"],
            ["b", `${fmt(b)}`, "#4ade80"],
            ["c", `${fmt(c)}`, "#a78bfa"],
            ["a/sinA", fmt(ratio), "#ffd93d"],
          ]),
        );

        const steps = [
          {
            title: "Rappel de la loi des sinus",
            body: `<span class="hl">a/sin A = b/sin B = c/sin C</span><br>Ce rapport est constant pour un même triangle.`,
          },
          {
            title: "Calculer C",
            body: `C = 180° − A − B<br>= 180° − ${A}° − ${B}°<br>= <span class="hb">${C}°</span>`,
          },
          {
            title: "Calculer le rapport",
            body: `a / sin A = ${fmt(a)} / sin(${A}°)<br>= ${fmt(a)} / ${fmt(Math.sin(Ar))}<br>= <span class="hl">${fmt(ratio)}</span>`,
          },
          {
            title: "Calculer b",
            body: `b = ratio × sin B<br>= <span class="hl">${fmt(ratio)}</span> × sin(${B}°)<br>= <span class="hl">${fmt(ratio)}</span> × ${fmt(Math.sin(Br))}<br>= <span class="hg">${fmt(b)}</span>`,
          },
          {
            title: "Calculer c",
            body: `c = ratio × sin C<br>= <span class="hl">${fmt(ratio)}</span> × sin(${C}°)<br>= <span class="hl">${fmt(ratio)}</span> × ${fmt(Math.sin(Cr))}<br>= <span class="hp">${fmt(c)}</span>`,
          },
        ];
        panel.appendChild(
          buildSteps(
            steps,
            st.step,
            () => {
              st.step++;
              renderPanel();
              draw();
            },
            () => {
              st.step = 0;
              renderPanel();
              draw();
            },
          ),
        );
        panel.appendChild(
          ruleCard(
            "💡 LOI DES SINUS",
            `<div class="formula">a / sin A = b / sin B = c / sin C</div>
     <p class="hint">Utilise cette loi quand tu connais :<br>• 1 côté + l'angle <span>en face</span> + un autre angle<br>• ou 2 angles + 1 côté</p>`,
          ),
        );
      }

      // ─── LOI DES COSINUS ──────────────────────────────────────
      function renderCosinus(panel) {
        const st = state.cosinus;

        const ctrl = document.createElement("div");
        ctrl.className = "card";
        ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;
        ctrl.appendChild(
          slider("co_a", "Côté a", st.a, 1, 12, 0.5, (v) => {
            st.a = v;
            st.step = 0;
          }),
        );
        ctrl.appendChild(
          slider("co_b", "Côté b", st.b, 1, 12, 0.5, (v) => {
            st.b = v;
            st.step = 0;
          }),
        );
        ctrl.appendChild(
          slider("co_C", "Angle C (°)", st.C, 5, 175, 1, (v) => {
            st.C = v;
            st.step = 0;
          }),
        );
        panel.appendChild(ctrl);

        const { a, b, C } = st;
        const Cr = deg(C);
        const c2 = a * a + b * b - 2 * a * b * Math.cos(Cr);
        const c = round2(Math.sqrt(Math.max(0, c2)));

        // Reverse: find angles A and B
        const cosA = (b * b + c * c - a * a) / (2 * b * c);
        const cosB = (a * a + c * c - b * b) / (2 * a * c);
        const A = round2(
          (Math.acos(Math.max(-1, Math.min(1, cosA))) * 180) / Math.PI,
        );
        const B = round2(
          (Math.acos(Math.max(-1, Math.min(1, cosB))) * 180) / Math.PI,
        );

        panel.appendChild(
          bigVal([
            ["c²", `${fmt(c2)}`, "#a78bfa"],
            ["c", `${fmt(c)}`, "#ffd93d"],
            ["Angle A", `${A}°`, "#ff6b6b"],
            ["Angle B", `${B}°`, "#4ade80"],
          ]),
        );

        const steps = [
          {
            title: "Rappel de la loi des cosinus",
            body: `<span class="hl">c² = a² + b² − 2ab·cos C</span>`,
          },
          {
            title: "Calculer c²",
            body: `c² = ${a}² + ${b}² − 2×${a}×${b}×cos(${C}°)<br>= ${a * a} + ${b * b} − ${2 * a * b}×${fmt(Math.cos(Cr))}<br>= ${a * a + b * b} − ${fmt(2 * a * b * Math.cos(Cr))}<br>= <span class="hl">${fmt(c2)}</span>`,
          },
          {
            title: "Calculer c",
            body: `c = √(${fmt(c2)}) = <span class="hl">${fmt(c)}</span>`,
          },
          {
            title: "Trouver l'angle A (si besoin)",
            body: `cos A = (b² + c² − a²) / (2bc)<br>= (${b * b} + ${fmt(c * c)} − ${a * a}) / (2×${b}×${fmt(c)})<br>= <span class="hg">${fmt(cosA)}</span><br>A = arccos(${fmt(cosA)}) = <span class="hr">${A}°</span>`,
          },
          {
            title: "Vérification",
            body: `A + B + C = ${A}° + ${B}° + ${C}° = <span class="hl">${round2(A + B + C)}°</span> ≈ 180° ✓`,
          },
        ];
        panel.appendChild(
          buildSteps(
            steps,
            st.step,
            () => {
              st.step++;
              renderPanel();
              draw();
            },
            () => {
              st.step = 0;
              renderPanel();
              draw();
            },
          ),
        );
        panel.appendChild(
          ruleCard(
            "💡 LOI DES COSINUS",
            `<div class="formula">c² = a² + b² − 2ab · cos C</div>
     <p class="hint">Utilise quand tu connais :<br>• <span>2 côtés + l'angle inclus</span> entre eux → trouver le 3e côté<br>• <span>3 côtés</span> → trouver un angle</p>`,
          ),
        );
      }

      // ─── AIRE ─────────────────────────────────────────────────
      function renderAire(panel) {
        const st = state.aire;
        const { a, b, C, mode, step, score } = st;

        const modeRow = document.createElement("div");
        modeRow.className = "mode-row";
        modeRow.innerHTML = `
    <button class="mode-btn ${mode === "demo" ? "active" : ""}" data-m="demo">📖 Démonstration</button>
    <button class="mode-btn ${mode === "exercice" ? "active" : ""}" data-m="exercice">✏️ À toi !</button>`;
        modeRow.querySelectorAll(".mode-btn").forEach(
          (b) =>
            (b.onclick = () => {
              st.mode = b.dataset.m;
              st.step = 0;
              if (b.dataset.m === "exercice") genAireEx();
              renderPanel();
            }),
        );
        panel.appendChild(modeRow);

        if (mode === "demo") {
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;
          ctrl.appendChild(
            slider("ai_a", "Côté a", a, 1, 12, 0.5, (v) => {
              st.a = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("ai_b", "Côté b", b, 1, 12, 0.5, (v) => {
              st.b = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("ai_C", "Angle entre eux C (°)", C, 5, 175, 1, (v) => {
              st.C = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          const Cr = deg(C);
          const S = round2(0.5 * a * b * Math.sin(Cr));
          const h = round2(b * Math.sin(Cr));

          panel.appendChild(
            bigVal([
              ["Côté a", `${fmt(a)}`, "#4ade80"],
              ["Côté b", `${fmt(b)}`, "#60a5fa"],
              ["Angle C", `${C}°`, "#ffd93d"],
              ["Aire S", `${fmt(S)}`, "#ff6b6b"],
            ]),
          );

          const steps = [
            {
              title: "Rappel de la formule générale",
              body: `<span class="hl">S = ½ × a × b × sin C</span><br>où C est l'angle <span class="hl">compris entre</span> a et b.`,
            },
            {
              title: "Identifier les éléments",
              body: `a = <span class="hg">${fmt(a)}</span>, b = <span class="hb">${fmt(b)}</span>, C = <span class="hl">${C}°</span>`,
            },
            {
              title: "Calculer sin C",
              body: `sin(${C}°) = <span class="hl">${fmt(Math.sin(Cr))}</span>`,
            },
            {
              title: "Calculer l'aire",
              body: `S = ½ × <span class="hg">${fmt(a)}</span> × <span class="hb">${fmt(b)}</span> × <span class="hl">${fmt(Math.sin(Cr))}</span><br>= 0.5 × ${fmt(a * b)} × ${fmt(Math.sin(Cr))}<br>= <span class="hr">${fmt(S)}</span>`,
            },
            {
              title: "Vérification (base × hauteur / 2)",
              body: `hauteur h = b × sin C = ${fmt(b)} × ${fmt(Math.sin(Cr))} = <span class="hb">${fmt(h)}</span><br>S = base × h / 2 = ${fmt(a)} × ${fmt(h)} / 2 = <span class="hr">${fmt((a * h) / 2)}</span> ✓`,
            },
          ];
          panel.appendChild(
            buildSteps(
              steps,
              step,
              () => {
                st.step++;
                renderPanel();
                draw();
              },
              () => {
                st.step = 0;
                renderPanel();
                draw();
              },
            ),
          );
          panel.appendChild(
            ruleCard(
              "💡 AIRE D'UN TRIANGLE",
              `<div class="formula">S = ½ × a × b × sin C</div>
       <p class="hint">C est l'angle <span>compris entre</span> les deux côtés a et b.<br>Si C = 90° → sin C = 1 → on retrouve <span>S = ½ × a × b</span></p>`,
            ),
          );
        } else {
          panel.appendChild(scoreBar(score));
          if (!st.ex) genAireEx();
          const ex = st.ex;
          const exCard = document.createElement("div");
          exCard.className = "card";
          exCard.innerHTML = `<div class="card-title">✏️ EXERCICE</div>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:8px;">Triangle : a = <span style="color:var(--accent);font-weight:700">${ex.a}</span>, b = <span style="color:var(--accent);font-weight:700">${ex.b}</span>, angle C = <span style="color:var(--accent);font-weight:700">${ex.C}°</span></p>
      <p style="font-size:0.85rem;margin-bottom:10px;">Calcule l'aire <strong style="color:var(--accent)">S</strong> (arrondi à 2 décimales) :</p>`;
          if (!st.answered) {
            const row = document.createElement("div");
            row.className = "ex-input-row";
            const inp = document.createElement("input");
            inp.className = "ex-input";
            inp.type = "number";
            inp.step = "0.01";
            inp.placeholder = "ta réponse…";
            const btn = document.createElement("button");
            btn.className = "ex-submit";
            btn.textContent = "✓";
            btn.onclick = () => {
              const ans = parseFloat(inp.value);
              const correct = Math.abs(ans - ex.answer) < 0.1;
              if (correct) {
                score.ok++;
                score.streak++;
              } else {
                score.streak = 0;
              }
              score.total++;
              st.answered = true;
              st.lastCorrect = correct;
              renderPanel();
              draw();
            };
            row.appendChild(inp);
            row.appendChild(btn);
            exCard.appendChild(row);
          } else {
            const fb = document.createElement("div");
            fb.className = `ex-feedback ${st.lastCorrect ? "ok" : "ko"}`;
            fb.innerHTML = st.lastCorrect
              ? `✅ Bravo ! S = <strong>${fmt(ex.answer)}</strong>`
              : `❌ Raté. S = <strong>${fmt(ex.answer)}</strong> — ½ × ${ex.a} × ${ex.b} × sin(${ex.C}°)`;
            exCard.appendChild(fb);
            const nxt = document.createElement("button");
            nxt.className = "step-btn";
            nxt.textContent = "Prochain exercice →";
            nxt.style.marginTop = "8px";
            nxt.onclick = () => {
              genAireEx();
              st.answered = false;
              renderPanel();
              draw();
            };
            exCard.appendChild(nxt);
          }
          panel.appendChild(exCard);
          panel.appendChild(
            ruleCard(
              "💡 FORMULE",
              `<div class="formula sm">S = ½ × a × b × sin C</div>`,
            ),
          );
        }
      }

      function genAireEx() {
        const st = state.aire;
        const angles = [30, 45, 60, 90, 120];
        const C = angles[Math.floor(Math.random() * angles.length)];
        const a = Math.round((2 + Math.random() * 8) * 10) / 10;
        const b = Math.round((2 + Math.random() * 8) * 10) / 10;
        const answer = round2(0.5 * a * b * Math.sin(deg(C)));
        st.ex = { a, b, C, answer };
      }

      // ===================== PDF MAP =====================
      const CORR_TRIG = {
        label: "📝 Correction",
        url: "correctif_exo/Correctif_exo.pdf",
      };
      const PDF_MAP_TRIG = {
        rappels: [
          { label: "📋 Synthèse", url: "pdfs/rappels/Synth%C3%A8se.pdf" },
          CORR_TRIG,
        ],
        triangle: [
          { label: "🎦 Slides", url: "pdfs/triangle%20rectangle/SLIDE.pdf" },
          {
            label: "📋 Synthèse",
            url: "pdfs/triangle%20rectangle/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        problemes: [
          {
            label: "🎦 Slides",
            url: "pdfs/probl%C3%A8%C2%A7me%20r%C3%A9els/SLIDE.pdf",
          },
          {
            label: "📋 Synthèse",
            url: "pdfs/probl%C3%A8%C2%A7me%20r%C3%A9els/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        cercle: [
          {
            label: "🖼️ Schéma",
            url: "pdfs/cercle%20trigonom%C3%A9trique/cercletrigo.png",
            type: "img",
          },
          {
            label: "🎦 Slides",
            url: "pdfs/cercle%20trigonom%C3%A9trique/SLIDE.pdf",
          },
          {
            label: "📋 Synthèse",
            url: "pdfs/cercle%20trigonom%C3%A9trique/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        identites: [
          {
            label: "🎦 Slides",
            url: "pdfs/identit%C3%A9s%20trigonom%C3%A9triques/SLIDE.pdf",
          },
          {
            label: "📋 Synthèse",
            url: "pdfs/identit%C3%A9s%20trigonom%C3%A9triques/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        sinus: [
          { label: "🎦 Slides", url: "pdfs/Loi%20des%20sinus/SLIDE.pdf" },
          {
            label: "📋 Synthèse",
            url: "pdfs/Loi%20des%20sinus/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        cosinus: [
          { label: "🎦 Slides", url: "pdfs/loi%20des%20cosinus/SLIDE.pdf" },
          {
            label: "📋 Synthèse",
            url: "pdfs/loi%20des%20cosinus/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
        aire: [
          { label: "🎦 Slides", url: "pdfs/Aire%20triangle/SLIDE.pdf" },
          {
            label: "📋 Synthèse",
            url: "pdfs/Aire%20triangle/Synth%C3%A8se.pdf",
          },
          CORR_TRIG,
        ],
      };

      function renderPdfSection() {
        const sec = document.getElementById("pdf-section");
        const docs = PDF_MAP_TRIG[state.tab];
        if (!docs || docs.length === 0) {
          sec.innerHTML = "";
          return;
        }

        const btns = docs
          .map(
            (d, i) =>
              `<button class="pdf-toggle-btn${i === 0 ? " active" : ""}" onclick="pdfSwitch(this,'tpdf-${i}')">${d.label}</button>`,
          )
          .join("");
        const panes = docs
          .map((d, i) => {
            const isImg = d.type === "img";
            const content = isImg
              ? `<img src="${d.url}" style="width:100%;border-radius:10px;display:block;" alt="${d.label}">`
              : `<embed src="${d.url}" type="application/pdf" class="pdf-embed">
       <a href="${d.url}" target="_blank" class="pdf-fallback">↗ Ouvrir en plein écran</a>`;
            return `<div class="pdf-pane${i === 0 ? " active" : ""}" id="tpdf-${i}">${content}</div>`;
          })
          .join("");

        sec.innerHTML = `<div class="pdf-outer-card">
    <div class="pdf-header"><span class="pdf-header-title">📄 Documents du chapitre</span><div class="pdf-header-line"></div></div>
    <div class="pdf-toggle-row">${btns}</div>${panes}</div>`;
      }

      function pdfSwitch(btn, paneId) {
        const card_ = btn.closest(".pdf-outer-card");
        card_
          .querySelectorAll(".pdf-toggle-btn")
          .forEach((b) => b.classList.remove("active"));
        card_
          .querySelectorAll(".pdf-pane")
          .forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(paneId).classList.add("active");
      }

      // ===================== TABS + INIT =====================
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((x) => x.classList.remove("active"));
          t.classList.add("active");
          state.tab = t.dataset.tab;
          renderPanel();
          renderPdfSection();
          setTimeout(() => {
            resize();
            draw();
          }, 20);
        });
      });

      window.addEventListener("resize", resize);
      resize();
      renderPanel();
      renderPdfSection();
    </script>
  </body>
</html>
