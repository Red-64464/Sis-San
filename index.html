<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Sis-San</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#070712" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="assets/icons/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #070712;
        --card: #0e0e20;
        --border: #1c1c38;
        --text: #eeeeff;
        --muted: #5858a0;
        --theory: #a78bfa;
        --study: #00f5c3;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Lexend", sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: env(safe-area-inset-bottom, 24px);
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        opacity: 0.18;
        z-index: 0;
      }
      .blob-1 {
        width: 420px;
        height: 420px;
        background: var(--theory);
        top: -120px;
        left: -80px;
      }
      .blob-2 {
        width: 350px;
        height: 350px;
        background: var(--study);
        bottom: -100px;
        right: -60px;
      }
      .landing {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 480px;
      }
      .logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        margin-bottom: 4px;
      }
      .logo-img {
        width: 110px;
        height: 110px;
        border-radius: 28px;
        object-fit: contain;
        filter: drop-shadow(0 0 28px rgba(0, 245, 195, 0.25))
          drop-shadow(0 0 12px rgba(167, 139, 250, 0.2));
        animation: logo-float 3.5s ease-in-out infinite;
      }
      @keyframes logo-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      .tagline {
        color: var(--muted);
        font-size: 0.92rem;
        text-align: center;
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        width: 100%;
      }
      .choice {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 22px;
        padding: 28px 18px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        cursor: pointer;
        text-decoration: none;
        color: var(--text);
        transition:
          transform 0.22s,
          border-color 0.22s,
          box-shadow 0.22s;
        position: relative;
        overflow: hidden;
      }
      .choice::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
      }
      .choice:hover {
        transform: translateY(-4px);
      }
      .choice:active {
        transform: scale(0.97);
      }
      .choice-theory {
        --c: var(--theory);
      }
      .choice-theory:hover {
        border-color: rgba(167, 139, 250, 0.5);
        box-shadow: 0 8px 40px rgba(167, 139, 250, 0.15);
      }
      .choice-theory::before {
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(167, 139, 250, 0.12),
          transparent 70%
        );
      }
      .choice-theory:hover::before {
        opacity: 1;
      }
      .choice-study {
        --c: var(--study);
      }
      .choice-study:hover {
        border-color: rgba(0, 245, 195, 0.5);
        box-shadow: 0 8px 40px rgba(0, 245, 195, 0.15);
      }
      .choice-study::before {
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(0, 245, 195, 0.12),
          transparent 70%
        );
      }
      .choice-study:hover::before {
        opacity: 1;
      }
      .choice-icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--c) 20%, transparent),
          color-mix(in srgb, var(--c) 8%, transparent)
        );
        border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      }
      .choice h2 {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .choice p {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.5;
      }
      .choice-arrow {
        margin-top: auto;
        padding: 10px 20px;
        border-radius: 12px;
        font-size: 0.82rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        font-family: "Lexend", sans-serif;
        transition:
          filter 0.18s,
          transform 0.18s;
        color: #fff;
      }
      .choice-theory .choice-arrow {
        background: linear-gradient(135deg, #a78bfa, #7c5cbf);
      }
      .choice-study .choice-arrow {
        background: linear-gradient(135deg, #00f5c3, #00c49a);
      }
      .choice-arrow:hover {
        filter: brightness(1.15);
        transform: scale(1.04);
      }
      .footer-text {
        color: var(--muted);
        font-size: 0.72rem;
        margin-top: 20px;
        text-align: center;
      }
      @media (max-width: 400px) {
        .choices {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .choice {
          padding: 22px 16px 20px;
          flex-direction: row;
          gap: 14px;
          text-align: left;
        }
        .choice-icon {
          width: 56px;
          height: 56px;
          min-width: 56px;
          font-size: 1.6rem;
          border-radius: 16px;
        }
        .choice-info {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 4px;
        }
        .choice h2 {
          font-size: 1rem;
        }
        .choice-arrow {
          align-self: flex-start;
          padding: 8px 16px;
          font-size: 0.78rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="landing">
      <div class="logo">
        <img src="assets/icons/logo.png" alt="Sis-San" class="logo-img" />
      </div>
      <p class="tagline">Choisis ton mode pour commencer</p>
      <div class="choices">
        <a href="theory.html" class="choice choice-theory">
          <div class="choice-icon">📖</div>
          <div class="choice-info">
            <h2>Théorie</h2>
            <p>Cours, formules et exercices interactifs</p>
          </div>
          <div class="choice-arrow">Explorer →</div>
        </a>
        <a href="study/study.html" class="choice choice-study">
          <div class="choice-icon">🎯</div>
          <div class="choice-info">
            <h2>Étude</h2>
            <p>Pomodoro, tâches, stats et progression</p>
          </div>
          <div class="choice-arrow">Commencer →</div>
        </a>
      </div>
      <p class="footer-text">Fait avec 💛 pour apprendre plus facilement</p>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      }
    </script>
  </body>
</html>
