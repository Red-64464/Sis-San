          );
          ctrl.appendChild(
            slider("bi_b", "b", b, 1, 10, 1, "#00f5c3", (v) => {
              st.b = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          const Ka = k * a,
            Kb = k * b;
          panel.appendChild(
            exprBox(
              `<span class="c-p">${Ka}</span>x + <span class="c-g">${Kb}</span>`,
            ),
          );

          const fcSteps = [
            {
              title: "Identifier le facteur commun",
              body: `On cherche ce qui divise à la fois <span class="c-p">${Ka}</span> et <span class="c-g">${Kb}</span><br>
                     pgcd(${Ka}, ${Kb}) = <span class="c-r">${k}</span><br>
                     ✅ Le facteur commun est <span class="c-r">${k}</span>`,
            },
            {
              title: "Décomposer chaque terme",
              body: `<span class="c-p">${Ka}</span>x = <span class="c-r">${k}</span> × <span class="c-p">${a}</span>x<br>
                     <span class="c-g">${Kb}</span>&nbsp;&nbsp; = <span class="c-r">${k}</span> × <span class="c-g">${b}</span>`,
            },
            {
              title: "Mettre le facteur commun devant",
              body: `<span class="c-p">${Ka}</span>x + <span class="c-g">${Kb}</span> = <span class="c-r">${k}</span>(<span class="c-p">${a}</span>x + <span class="c-g">${b}</span>)`,
            },
            {
              title: "Résultat final",
              body: `<div class="formula"><span class="c-r">${k}</span>(<span class="c-p">${a}</span>x + <span class="c-g">${b}</span>)</div>
                     ✅ Vérif : ${k}×${a}x + ${k}×${b} = ${Ka}x + ${Kb} ✓`,
            },
          ];
          panel.appendChild(
            buildSteps(
              fcSteps,
              step,
              () => {
                st.step++;
                renderPanel();
              },
              () => {
                st.step = 0;
                renderPanel();
              },
            ),
          );
          panel.appendChild(
            ruleCard(
              "💡 RÈGLE — Facteur commun",
              `<p>Pour <span>Ax + B</span> :</p>
             <ol style="margin:8px 0 0 18px;line-height:1.8">
               <li>Trouve le pgcd de A et B → c'est <span>k</span></li>
               <li>Écris A = k·a et B = k·b</li>
               <li>Mets k devant : <span>k(ax + b)</span></li>
             </ol>`,
            ),
          );
        }

        // ═══════════════════════════════════════════
        // TECHNIQUE 2 — DIFFÉRENCE DE CARRÉS
        // ═══════════════════════════════════════════
        else if (tech === "diff_carres") {
          const { a, b } = st;
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>
            <p style="font-size:0.8rem;color:var(--muted);margin-bottom:8px;">On factorise : a² − b²</p>`;
          ctrl.appendChild(
            slider("bi_a", "a", a, 1, 12, 1, "#ff6b6b", (v) => {
              st.a = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("bi_b", "b", b, 1, 12, 1, "#00f5c3", (v) => {
              st.b = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          const a2 = a * a,
            b2 = b * b;
          panel.appendChild(
            exprBox(
              `<span class="c-r">${a2}</span> − <span class="c-g">${b2}</span>`,
            ),
          );

          const dcSteps = [
            {
              title: "Reconnaître la différence de carrés",
              body: `<span class="c-r">${a2}</span> = <span class="c-r">${a}</span>² &nbsp;&nbsp;et&nbsp;&nbsp; <span class="c-g">${b2}</span> = <span class="c-g">${b}</span>²<br>
                     C'est de la forme <span class="c-p">A² − B²</span> ✅`,
            },
            {
              title: "Appliquer la formule",
              body: `A² − B² = (A + B)(A − B)<br><br>
                     <span class="c-r">${a}</span>² − <span class="c-g">${b}</span>² = (<span class="c-r">${a}</span> + <span class="c-g">${b}</span>)(<span class="c-r">${a}</span> − <span class="c-g">${b}</span>)`,
            },
            {
              title: "Calculer les facteurs",
              body: `(<span class="c-r">${a}</span> + <span class="c-g">${b}</span>) = <span class="c-p">${a + b}</span><br>
                     (<span class="c-r">${a}</span> − <span class="c-g">${b}</span>) = <span class="c-p">${a - b}</span>`,
            },
            {
              title: "Résultat + vérification",
              body: `<div class="formula">(<span class="c-p">${a + b}</span>)(<span class="c-p">${a - b}</span>) = <span class="c-r">${(a + b) * (a - b)}</span></div>
                     Vérif : <span class="c-r">${a2}</span> − <span class="c-g">${b2}</span> = <span class="c-r">${a2 - b2}</span> ✓`,
            },
          ];
          panel.appendChild(
            buildSteps(
              dcSteps,
              step,
              () => {
                st.step++;
                renderPanel();
              },
              () => {
                st.step = 0;
                renderPanel();
              },
            ),
          );
          panel.appendChild(
            ruleCard(
              "💡 RÈGLE — Différence de carrés",
              `<div class="formula">A² − B² = (A + B)(A − B)</div>
             <p class="hint">
               ✅ Marche pour TOUTE soustraction de deux carrés<br>
               ⚠️ A² <span>+</span> B² ne se factorise <span>PAS</span> dans ℝ !<br><br>
               <b>Exemples :</b><br>
               x² − 9 → ✅ &nbsp;|&nbsp; 4x² − 25 → ✅<br>
               x² + 9 → ❌ &nbsp;|&nbsp; 9x² + 4 → ❌
             </p>`,
            ),
          );
        }

        // ═══════════════════════════════════════════
        // TECHNIQUE 3 — PUISSANCES xⁿ±1
        // ═══════════════════════════════════════════
        else if (tech === "puissances") {
          const { n, signType } = st;
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;
          ctrl.appendChild(
            slider("bi_n", "n (l'exposant)", n, 2, 8, 1, "#ffd93d", (v) => {
              st.n = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          // Toggle xⁿ−1 / xⁿ+1
          const togRow = document.createElement("div");
          togRow.className = "mode-row";
          togRow.innerHTML = `
            <button class="mode-btn ${signType === "minus" ? "active" : ""}" data-s="minus">x<sup>${n}</sup> − 1</button>
            <button class="mode-btn ${signType === "plus" ? "active" : ""}" data-s="plus">x<sup>${n}</sup> + 1</button>
          `;
          togRow.querySelectorAll(".mode-btn").forEach(
            (btn) =>
              (btn.onclick = () => {
                st.signType = btn.dataset.s;
                st.step = 0;
                renderPanel();
              }),
          );
          panel.appendChild(togRow);

          if (signType === "minus") {
            // xⁿ − 1 = (x − 1)(xⁿ⁻¹ + xⁿ⁻² + … + x + 1)  — ALWAYS works
            const poly = buildPoly(n - 1, false);
            panel.appendChild(exprBox(`x<sup>${n}</sup> − 1`));

            const steps = [
              {
                title: "Identifier la forme",
                body: `On voit <span class="c-r">x<sup>${n}</sup> − 1</span>, c'est la forme <span class="c-p">xⁿ − 1</span><br>
                       ✅ Cette forme se factorise TOUJOURS (n pair ou impair, peu importe !)`,
              },
              {
                title: "Écrire le 1er facteur : (x − 1)",
                body: `La règle dit que <span class="c-r">(x − 1)</span> est TOUJOURS un facteur de xⁿ − 1<br>
                       On écrit : <span class="c-r">(x − 1)</span> × (quelque chose)`,
              },
              {
                title: "Descendre les puissances (de n−1 jusqu'à 0)",
                body: `On part de x<sup>${n - 1}</sup> et on descend jusqu'à 1 (= x⁰) :<br><br>
                       <span class="c-g">${buildPoly(n - 1, false)}</span><br><br>
                       🔑 Les signes sont <b>TOUS +</b>`,
              },
              {
                title: "Résultat final",
                body: `<div class="formula">x<sup>${n}</sup> − 1 = <span class="c-r">(x − 1)</span>(<span class="c-g">${poly}</span>)</div>`,
              },
              {
                title: "Vérification numérique",
                body: generateVerif(n, "minus"),
              },
            ];
            panel.appendChild(
              buildSteps(
                steps,
                step,
                () => {
                  st.step++;
                  renderPanel();
                },
                () => {
                  st.step = 0;
                  renderPanel();
                },
              ),
            );
            panel.appendChild(
              ruleCard(
                "💡 RÈGLE 1 — xⁿ − 1",
                `<div class="formula">x<sup>n</sup> − 1 = (x − 1)(x<sup>n−1</sup> + x<sup>n−2</sup> + … + x + 1)</div>
               <p class="hint">
                 ✅ Marche pour TOUS les n (pair ou impair)<br>
                 ✅ Les signes dans la grande parenthèse sont <b>TOUS +</b><br>
                 ✅ On part de x<sup>n−1</sup> et on descend jusqu'à x⁰ = 1
               </p>`,
              ),
            );
          } else {
            // xⁿ + 1 — seulement si n est IMPAIR
            const nIsOdd = n % 2 !== 0;
            panel.appendChild(exprBox(`x<sup>${n}</sup> + 1`));

            if (!nIsOdd) {
              // n pair → IMPOSSIBLE
              const hint = n > 2 ? n - 1 : n + 1;
              panel.appendChild(
                card(
                  "⛔ Impossible dans ℝ",
                  `<p style="margin-bottom:8px"><span class="c-r">n = ${n} est pair</span> → on ne peut <b>PAS</b> factoriser x<sup>${n}</sup> + 1 dans ℝ</p>
                 <p style="margin-bottom:8px">La formule magique ne marche que si n est <b>impair</b> (3, 5, 7…)</p>
                 <p>💡 Essaie n = ${hint} dans le slider !</p>`,
                ),
              );
              panel.appendChild(
                ruleCard(
                  "⚠️ RÈGLE IMPORTANTE",
                  `<div class="formula">x<sup>n</sup> + 1 → factorisable SEULEMENT si n est IMPAIR</div>
                 <p class="hint">
                   n pair (2, 4, 6…) → <span class="c-r">IMPOSSIBLE dans ℝ</span><br>
                   n impair (3, 5, 7…) → <span class="c-g">POSSIBLE ✅</span>
                 </p>`,
                ),
              );
            } else {
              // n impair → factorisation possible
              // xⁿ + 1 = (x + 1)(xⁿ⁻¹ − xⁿ⁻² + xⁿ⁻³ − … + 1)  signes alternés
              const poly = buildPoly(n - 1, true);
              const steps = [
                {
                  title: "Vérifier que n est impair",
                  body: `n = <span class="c-g">${n}</span> → <span class="c-g">impair ✅</span><br>
                         On peut utiliser la technique !`,
                },
                {
                  title: "Écrire le 1er facteur : (x + 1)",
                  body: `La règle dit que <span class="c-r">(x + 1)</span> est toujours un facteur de xⁿ + 1 quand n est impair<br>
                         On écrit : <span class="c-r">(x + 1)</span> × (quelque chose)`,
                },
                {
                  title: "Descendre les puissances en alternant les signes",
                  body: `On part de x<sup>${n - 1}</sup> et on descend :<br><br>
                         <span class="c-g">${poly}</span><br><br>
                         ⚡ Les signes <b>alternent</b> : +, −, +, −, …<br>
                         ✅ Ça finit TOUJOURS par <b>+1</b>`,
                },
                {
                  title: "Résultat final",
                  body: `<div class="formula">x<sup>${n}</sup> + 1 = <span class="c-r">(x + 1)</span>(<span class="c-g">${poly}</span>)</div>`,
                },
                {
                  title: "Vérification numérique",
                  body: generateVerif(n, "plus"),
                },
              ];
              panel.appendChild(
                buildSteps(
                  steps,
                  step,
                  () => {
                    st.step++;
                    renderPanel();
                  },
                  () => {
                    st.step = 0;
                    renderPanel();
                  },
                ),
              );
              panel.appendChild(
                ruleCard(
                  "💡 RÈGLE 2 — xⁿ + 1 (n impair)",
                  `<div class="formula">x<sup>n</sup> + 1 = (x + 1)(x<sup>n−1</sup> − x<sup>n−2</sup> + x<sup>n−3</sup> − … + 1)</div>
                 <p class="hint">
                   ⚠️ Marche <b>UNIQUEMENT</b> si n est <b>IMPAIR</b><br>
                   ✅ Les puissances descendent de n−1 jusqu'à 0<br>
                   ✅ Les signes <b>alternent</b> : +, −, +, −, …<br>
                   ✅ Ça finit TOUJOURS par <span>+1</span>
                 </p>`,
                ),
              );
            }
          }

          // ─── Summary table ───
          panel.appendChild(
            card(
              "🧠 Résumé ultra clair",
              `<table style="width:100%;border-collapse:collapse;font-size:0.82rem">
               <tr style="color:var(--muted);border-bottom:1px solid var(--border)">
                 <th style="text-align:left;padding:6px 4px">Expression</th>
                 <th style="text-align:left;padding:6px 4px">Factorisable ?</th>
                 <th style="text-align:left;padding:6px 4px">Ce qu'on fait</th>
               </tr>
               <tr style="border-bottom:1px solid var(--border)">
                 <td style="padding:5px 4px">xⁿ − 1</td>
                 <td style="padding:5px 4px;color:#4ade80">✅ Oui (tous n)</td>
                 <td style="padding:5px 4px">(x − 1) × toutes puissances avec <b>+</b></td>
               </tr>
               <tr style="border-bottom:1px solid var(--border)">
                 <td style="padding:5px 4px">xⁿ + 1 (n impair)</td>
                 <td style="padding:5px 4px;color:#4ade80">✅ Oui</td>
                 <td style="padding:5px 4px">(x + 1) × puissances signes <b>alternés</b></td>
               </tr>
               <tr>
                 <td style="padding:5px 4px">xⁿ + 1 (n pair)</td>
                 <td style="padding:5px 4px;color:var(--accent)">❌ Non</td>
                 <td style="padding:5px 4px">Impossible dans ℝ</td>
               </tr>
             </table>`,
            ),
          );
        }
      }

      // ===================== TAB 6: TRINÔMES =====================
      function renderTrinomes(panel) {
        const st = state.trinomes;
        const { a, b, c, step, mode } = st;

        const modeEl = document.createElement("div");
        modeEl.className = "mode-row";
        modeEl.innerHTML = `<button class="mode-btn ${mode === "demo" ? "active" : ""}" data-m="demo">📖 Démonstration</button>
    <button class="mode-btn ${mode === "exercice" ? "active" : ""}" data-m="exercice">✏️ À toi !</button>`;
        modeEl.querySelectorAll(".mode-btn").forEach(
          (btn) =>
            (btn.onclick = () => {
              st.mode = btn.dataset.m;
              if (btn.dataset.m === "exercice") genTriEx();
              st.step = 0;
              renderPanel();
            }),
        );
        panel.appendChild(modeEl);

        if (mode === "demo") {
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES (ax² + bx + c)</div>`;
          ctrl.appendChild(
            slider("t_a", "a", a, -5, 5, 1, "#ff6b6b", (v) => {
              st.a = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("t_b", "b", b, -12, 12, 1, "#00f5c3", (v) => {
              st.b = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("t_c", "c", c, -12, 12, 1, "#ffd93d", (v) => {
              st.c = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          if (a === 0) {
            panel.appendChild(
              card(
                "⚠️",
                `<p style="color:var(--muted);text-align:center;">a ne peut pas être 0 pour un trinôme. Change la valeur de a.</p>`,
              ),
            );
            return;
          }

          // Build expression display
          let exprStr = "";
          if (a === 1) exprStr += `<span class="c-r">x²</span>`;
          else if (a === -1) exprStr += `<span class="c-r">−x²</span>`;
          else exprStr += `<span class="c-r">${a}x²</span>`;
          if (b !== 0)
            exprStr += ` <span class="op">${S(b)}</span> <span class="c-g">${A(b)}x</span>`;
          if (c !== 0)
            exprStr += ` <span class="op">${S(c)}</span> <span class="c-y">${A(c)}</span>`;
          panel.appendChild(exprBox(exprStr));

          const delta = b * b - 4 * a * c;
          const sqrtDelta = Math.sqrt(Math.abs(delta));

          const steps = [
            {
              title: "Calcul du discriminant Δ",
              body: `Δ = b² − 4ac = <span class="c-g">${b}</span>² − 4×<span class="c-r">${a}</span>×<span class="c-y">${c}</span><br>= ${b * b} − ${4 * a * c} = <span class="c-p" style="font-size:1.2rem;">${delta}</span>`,
            },
          ];

          if (delta > 0) {
            const x1 = (-b - sqrtDelta) / (2 * a);
            const x2 = (-b + sqrtDelta) / (2 * a);
            const isNice =
              Number.isInteger(delta) &&
              Math.sqrt(delta) === Math.floor(Math.sqrt(delta));
            steps.push({
              title: "Δ > 0 → Deux racines !",
              body: `<div class="delta-badge delta-pos">Δ = ${delta} > 0 → 2 solutions</div>`,
            });
            steps.push({
              title: "Calcul des racines",
              body:
                `x₁ = (−b − √Δ) / (2a) = (${-b} − √${delta}) / ${2 * a} = <span class="c-o">${F(x1)}</span><br>` +
                `x₂ = (−b + √Δ) / (2a) = (${-b} + √${delta}) / ${2 * a} = <span class="c-b">${F(x2)}</span>`,
            });
            steps.push({
              title: "Factorisation !",
              body: `<span style="font-size:1.1rem;">${a === 1 ? "" : a === -1 ? "−" : a}(x − <span class="c-o">${F(x1)}</span>)(x − <span class="c-b">${F(x2)}</span>)</span>`,
            });
          } else if (delta === 0) {
            const x0 = -b / (2 * a);
            steps.push({
              title: "Δ = 0 → Racine double !",
              body: `<div class="delta-badge delta-zero">Δ = 0 → 1 racine double</div>`,
            });
            steps.push({
              title: "La racine double",
              body: `x₀ = −b / (2a) = ${-b} / ${2 * a} = <span class="c-o">${F(x0)}</span>`,
            });
            steps.push({
              title: "Factorisation !",
              body: `<span style="font-size:1.1rem;">${a === 1 ? "" : a === -1 ? "−" : a}(x − <span class="c-o">${F(x0)}</span>)²</span>`,
            });
          } else {
            steps.push({
              title: "Δ < 0 → Pas de racines réelles",
              body: `<div class="delta-badge delta-neg">Δ = ${delta} < 0 → Pas de factorisation dans ℝ</div>`,
            });
            steps.push({
              title: "Conclusion",
              body: `Ce trinôme n'a <span class="c-r">pas de racine réelle</span>.<br>On ne peut pas le factoriser avec des nombres réels.`,
            });
          }

          panel.appendChild(
            buildSteps(
              steps,
              step,
              () => {
                st.step++;
                renderPanel();
              },
              () => {
                st.step = 0;
                renderPanel();
              },
            ),
          );

          // Produit-somme method hint
          if (a === 1 || a === -1) {
            panel.appendChild(
              ruleCard(
                "🔎 ASTUCE : MÉTHODE PRODUIT-SOMME",
                `<p class="hint">Quand a = ${a}, on cherche deux nombres <span>p</span> et <span>q</span> tels que :<br><br>
        • p × q = ${a === 1 ? "c" : "−c"} = <span>${a === 1 ? c : -c}</span><br>
        • p + q = ${a === 1 ? "b" : "−b"} = <span>${a === 1 ? b : -b}</span><br><br>
        Si on les trouve → x² ${signedSp(b)}x ${signedSp(c)} = (x ${a === 1 ? signedSp("p") : signedSp("p")})(x ${a === 1 ? signedSp("q") : signedSp("q")})</p>`,
              ),
            );
          }

          panel.appendChild(
            ruleCard(
              "💡 FORMULES",
              `<div class="formula">Δ = b² − 4ac</div>
      <p class="hint">
      Si Δ > 0 : x₁ = (−b − √Δ) / (2a), x₂ = (−b + √Δ) / (2a)<br>
      Si Δ = 0 : x₀ = −b / (2a) (racine double)<br>
      Si Δ < 0 : pas de racine réelle<br><br>
      ax² + bx + c = <span>a(x − x₁)(x − x₂)</span></p>`,
            ),
          );
        } else {
          // Exercise
          const sc = st.score;
          const ex = st.ex;
          if (!ex) {
            genTriEx();
            renderPanel();
            return;
          }

          panel.appendChild(scoreBar(sc));
          panel.appendChild(
            card(
              "✏️ CALCULE LE DISCRIMINANT",
              `<div class="expr-box" style="font-size:1.15rem;">${ex.display}</div>
      <p style="font-size:0.85rem;color:var(--muted);margin-top:8px;">Δ = b² − 4ac = ?</p>`,
            ),
          );

          if (!st.answered) {
            const row = document.createElement("div");
            row.className = "ex-input-row";
            row.innerHTML = `<input class="ex-input" id="tr_ans" type="number" placeholder="Δ = ?" autofocus>
        <button class="ex-check" id="tr_btn">Vérifier ✓</button>`;
            panel.appendChild(row);
            setTimeout(() => {
              const inp = document.getElementById("tr_ans");
              const btn = document.getElementById("tr_btn");
              if (!inp || !btn) return;
              const check = () => {
                const v = parseFloat(inp.value);
                if (isNaN(v)) return;
                st.answered = true;
                sc.total++;
                ex.userAnswer = v;
                if (v === ex.delta) {
                  sc.ok++;
                  sc.streak++;
                } else {
                  sc.streak = 0;
                }
                renderPanel();
              };
              btn.onclick = check;
              inp.addEventListener("keydown", (e) => {
                if (e.key === "Enter") check();
              });
            }, 50);
          } else {
            const ok = ex.userAnswer === ex.delta;
            const fb = document.createElement("div");
            fb.className = "ex-feedback " + (ok ? "ok" : "ko");
            fb.innerHTML = ok
              ? `✅ Bravo ! Δ = ${ex.b}² − 4×${ex.a}×${ex.c} = ${ex.b * ex.b} − ${4 * ex.a * ex.c} = <strong>${ex.delta}</strong>`
              : `❌ Δ = ${ex.b}² − 4×${ex.a}×${ex.c} = ${ex.b * ex.b} − ${4 * ex.a * ex.c} = <strong>${ex.delta}</strong>`;
            panel.appendChild(fb);

            if (ex.delta >= 0) {
              const info = document.createElement("div");
              info.className = "card";
              if (ex.delta > 0) {
                info.innerHTML = `<div class="card-title" style="color:var(--green)">RACINES</div>
            <div style="font-family:Space Mono;font-size:0.9rem;text-align:center;">
            x₁ = <span style="color:var(--orange)">${F(ex.x1)}</span> &nbsp;&nbsp; x₂ = <span style="color:var(--blue)">${F(ex.x2)}</span></div>`;
              } else {
                info.innerHTML = `<div class="card-title" style="color:var(--yellow)">RACINE DOUBLE</div>
            <div style="font-family:Space Mono;font-size:0.9rem;text-align:center;">x₀ = <span style="color:var(--orange)">${F(ex.x1)}</span></div>`;
              }
              panel.appendChild(info);
            }

            const nb = document.createElement("button");
            nb.className = "btn-step";
            nb.textContent = "Exercice suivant →";
            nb.onclick = () => {
              genTriEx();
              st.answered = false;
              renderPanel();
            };
            panel.appendChild(nb);
          }
        }
      }

      function genTriEx() {
        // Generate from nice roots
        const a = 1;
        const r1 = randInt(-6, 6);
        const r2 = randInt(-6, 6);
        const b = -(r1 + r2);
        const c = r1 * r2;
        const delta = b * b - 4 * a * c;
        const sqrtD = Math.sqrt(Math.abs(delta));
        let display = `<span class="c-r">x²</span>`;
        if (b !== 0)
          display += ` <span class="op">${S(b)}</span> <span class="c-g">${A(b)}x</span>`;
        if (c !== 0)
          display += ` <span class="op">${S(c)}</span> <span class="c-y">${A(c)}</span>`;
        const st = state.trinomes;
        st.ex = {
          a,
          b,
          c,
          delta,
          display,
          x1: r1 < r2 ? r1 : r2,
          x2: r1 < r2 ? r2 : r1,
        };
        st.answered = false;
      }

      // ===================== TAB 7: QUADRINÔMES =====================
      const QUAD_BANK = [
        {
          terms: ["x³", "x²", "2x", "2"],
          expr: "x³ + x² + 2x + 2",
          steps: [
            {
              title: "Expression de départ",
              body: `<span class="c-r">x³</span> + <span class="c-r">x²</span> + <span class="c-g">2x</span> + <span class="c-g">2</span>`,
            },
            {
              title: "Regrouper par paires",
              body: `(<span class="c-r">x³</span> + <span class="c-r">x²</span>) + (<span class="c-g">2x</span> + <span class="c-g">2</span>)`,
            },
            {
              title: "Factoriser chaque paire",
              body: `<span class="c-r">x²</span>(<span class="c-p">x + 1</span>) + <span class="c-g">2</span>(<span class="c-p">x + 1</span>)`,
            },
            {
              title: "Facteur commun final !",
              body: `<span style="font-size:1.2rem;">(<span class="c-p">x + 1</span>)(<span class="c-r">x²</span> + <span class="c-g">2</span>)</span>`,
            },
          ],
        },
        {
          terms: ["x³", "−3x²", "4x", "−12"],
          expr: "x³ − 3x² + 4x − 12",
          steps: [
            {
              title: "Expression de départ",
              body: `<span class="c-r">x³</span> − <span class="c-r">3x²</span> + <span class="c-g">4x</span> − <span class="c-g">12</span>`,
            },
            {
              title: "Regrouper par paires",
              body: `(<span class="c-r">x³</span> − <span class="c-r">3x²</span>) + (<span class="c-g">4x</span> − <span class="c-g">12</span>)`,
            },
            {
              title: "Factoriser chaque paire",
              body: `<span class="c-r">x²</span>(<span class="c-p">x − 3</span>) + <span class="c-g">4</span>(<span class="c-p">x − 3</span>)`,
            },
            {
              title: "Facteur commun final !",
              body: `<span style="font-size:1.2rem;">(<span class="c-p">x − 3</span>)(<span class="c-r">x²</span> + <span class="c-g">4</span>)</span>`,
            },
          ],
        },
        {
          terms: ["2x³", "6x²", "x", "3"],
          expr: "2x³ + 6x² + x + 3",
          steps: [
            {
              title: "Expression de départ",
              body: `<span class="c-r">2x³</span> + <span class="c-r">6x²</span> + <span class="c-g">x</span> + <span class="c-g">3</span>`,
            },
            {
              title: "Regrouper par paires",
              body: `(<span class="c-r">2x³</span> + <span class="c-r">6x²</span>) + (<span class="c-g">x</span> + <span class="c-g">3</span>)`,
            },
            {
              title: "Factoriser chaque paire",
              body: `<span class="c-r">2x²</span>(<span class="c-p">x + 3</span>) + <span class="c-g">1</span>(<span class="c-p">x + 3</span>)`,
            },
            {
              title: "Facteur commun final !",
              body: `<span style="font-size:1.2rem;">(<span class="c-p">x + 3</span>)(<span class="c-r">2x²</span> + <span class="c-g">1</span>)</span>`,
            },
          ],
        },
        {
          terms: ["x³", "2x²", "−x", "−2"],
          expr: "x³ + 2x² − x − 2",
          steps: [
            {
              title: "Expression de départ",
              body: `<span class="c-r">x³</span> + <span class="c-r">2x²</span> − <span class="c-g">x</span> − <span class="c-g">2</span>`,
            },
            {
              title: "Regrouper par paires",
              body: `(<span class="c-r">x³</span> + <span class="c-r">2x²</span>) + (<span class="c-g">−x</span> − <span class="c-g">2</span>)`,
            },
            {
              title: "Factoriser chaque paire",
              body: `<span class="c-r">x²</span>(<span class="c-p">x + 2</span>) − <span class="c-g">1</span>(<span class="c-p">x + 2</span>)`,
            },
            {
              title: "Facteur commun final !",
              body: `<span style="font-size:1.2rem;">(<span class="c-p">x + 2</span>)(<span class="c-r">x²</span> − <span class="c-g">1</span>)</span>`,
            },
            {
              title: "Bonus : encore factoriser !",
              body: `x² − 1 = (x+1)(x−1) — identité remarquable !<br><span style="font-size:1.1rem;">= (<span class="c-p">x+2</span>)(<span class="c-o">x+1</span>)(<span class="c-b">x−1</span>)</span>`,
            },
          ],
        },
        {
          terms: ["x³", "−x²", "−4x", "4"],
          expr: "x³ − x² − 4x + 4",
          steps: [
            {
              title: "Expression de départ",
              body: `<span class="c-r">x³</span> − <span class="c-r">x²</span> − <span class="c-g">4x</span> + <span class="c-g">4</span>`,
            },
            {
              title: "Regrouper par paires",
              body: `(<span class="c-r">x³</span> − <span class="c-r">x²</span>) + (<span class="c-g">−4x</span> + <span class="c-g">4</span>)`,
            },
            {
              title: "Factoriser chaque paire",
              body: `<span class="c-r">x²</span>(<span class="c-p">x − 1</span>) − <span class="c-g">4</span>(<span class="c-p">x − 1</span>)`,
            },
            {
              title: "Facteur commun final !",
              body: `<span style="font-size:1.2rem;">(<span class="c-p">x − 1</span>)(<span class="c-r">x²</span> − <span class="c-g">4</span>)</span>`,
            },
            {
              title: "Bonus : a² − b² !",
              body: `x² − 4 = (x+2)(x−2)<br><span style="font-size:1.1rem;">= (<span class="c-p">x−1</span>)(<span class="c-o">x+2</span>)(<span class="c-b">x−2</span>)</span>`,
            },
          ],
        },
      ];

      function renderQuadrinomes(panel) {
        const st = state.quadrinomes;
        const { level, step } = st;
        const item = QUAD_BANK[level];

        // Nav
        const nav = document.createElement("div");
        nav.className = "nav-row";
        nav.innerHTML = `<button class="nav-btn" ${level === 0 ? "disabled" : ""}>← Précédent</button>
    <button class="nav-btn" style="text-align:center;color:var(--accent);">Exemple ${level + 1} / ${QUAD_BANK.length}</button>
    <button class="nav-btn" ${level >= QUAD_BANK.length - 1 ? "disabled" : ""}>Suivant →</button>`;
        const btns = nav.querySelectorAll(".nav-btn");
        btns[0].onclick = () => {
          st.level = Math.max(0, level - 1);
          st.step = 0;
          renderPanel();
        };
        btns[2].onclick = () => {
          st.level = Math.min(QUAD_BANK.length - 1, level + 1);
          st.step = 0;
          renderPanel();
        };
        panel.appendChild(nav);

        // Term blocks
        const tb = document.createElement("div");
        tb.className = "card";
        tb.innerHTML = `<div class="card-title">📦 LES 4 TERMES</div>`;
        const blocks = document.createElement("div");
        blocks.className = "term-blocks";
        item.terms.forEach((t, i) => {
          const b = document.createElement("div");
          b.className = "term-block" + (i < 2 ? " sel-a" : " sel-b");
          b.textContent = t;
          blocks.appendChild(b);
        });
        tb.appendChild(blocks);
        tb.innerHTML += `<p style="font-size:0.72rem;color:var(--muted);text-align:center;margin-top:8px;">On regroupe les <span style="color:var(--green)">verts</span> ensemble et les <span style="color:var(--yellow)">jaunes</span> ensemble</p>`;
        panel.appendChild(tb);

        // Expression
        panel.appendChild(exprBox(item.expr));

        // Steps
        panel.appendChild(
          buildSteps(
            item.steps,
            step,
            () => {
              st.step++;
              renderPanel();
            },
            () => {
              st.step = 0;
              renderPanel();
            },
          ),
        );

        panel.appendChild(
          ruleCard(
            "💡 MÉTHODE DU REGROUPEMENT",
            `<p class="hint">
    <span>1.</span> Séparer le quadrinôme en <span>2 paires</span> de termes.<br>
    <span>2.</span> Factoriser <span>chaque paire</span> séparément.<br>
    <span>3.</span> Si un <span>facteur commun</span> apparaît dans les deux → le sortir !<br><br>
    ⚠️ Parfois il faut <span>changer l'ordre</span> des termes pour que le regroupement marche.</p>`,
          ),
        );
      }

      // ===================== PDF MAP =====================
      const CORR_FACT = "pdfs/correction_exo/Correctif%20exo.pdf";
      const PDF_MAP = {
        distributivite: {
          slide: "pdfs/distributiovit%C3%A9/SLIDE.pdf",
          synth: "pdfs/distributiovit%C3%A9/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
        puissances: {
          slide: "pdfs/puissances/SLIDES.pdf",
          synth: "pdfs/puissances/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
        facteur: {
          slide: "pdfs/facteur%20commun/SLIDE.pdf",
          synth: "pdfs/facteur%20commun/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
        identites: {
          slide: "pdfs/identit%C3%A9s%20remarquable/SLIDES.pdf",
          synth: "pdfs/identit%C3%A9s%20remarquable/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
        binomes: {
          slide: "pdfs/binomes/SLIDE.pdf",
          synth: "pdfs/binomes/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
        trinomes: {
          slide: "pdfs/trinome/SLIDE.pdf",
          synth: "pdfs/trinome/1.pdf",
          correction: CORR_FACT,
        },
        quadrinomes: {
          slide: "pdfs/quadrinomes/SLIDE.pdf",
          synth: "pdfs/quadrinomes/Synth%C3%A8se.pdf",
          correction: CORR_FACT,
        },
      };

      function renderPdfSection() {
        const sec = document.getElementById("pdf-section");
        const pdfs = PDF_MAP[state.tab];
        if (!pdfs) {
          sec.innerHTML = "";
          return;
        }

        sec.innerHTML = `
          <div class="pdf-outer-card">
            <div class="pdf-header">
              <span class="pdf-header-title">📄 Documents du chapitre</span>
              <div class="pdf-header-line"></div>
            </div>
            <div class="pdf-toggle-row">
              <button class="pdf-toggle-btn active" onclick="pdfSwitch(this,'pdf-slide')">&#127902;&#65039; Slides</button>
              <button class="pdf-toggle-btn" onclick="pdfSwitch(this,'pdf-synth')">&#128203; Synth&egrave;se</button>
              <button class="pdf-toggle-btn" onclick="pdfSwitch(this,'pdf-correction')">&#128221; Correction</button>
            </div>
            <div class="pdf-pane active" id="pdf-slide">
              <embed src="${pdfs.slide}" type="application/pdf" class="pdf-embed">
              <a href="${pdfs.slide}" target="_blank" class="pdf-fallback">&#128279; Ouvrir en plein &eacute;cran</a>
            </div>
            <div class="pdf-pane" id="pdf-synth">
              <embed src="${pdfs.synth}" type="application/pdf" class="pdf-embed">
              <a href="${pdfs.synth}" target="_blank" class="pdf-fallback">&#128279; Ouvrir en plein &eacute;cran</a>
            </div>
            <div class="pdf-pane" id="pdf-correction">
              <embed src="${pdfs.correction}" type="application/pdf" class="pdf-embed">
              <a href="${pdfs.correction}" target="_blank" class="pdf-fallback">&#128279; Ouvrir en plein &eacute;cran</a>
            </div>
          </div>`;
      }

      function pdfSwitch(btn, paneId) {
        const card = btn.closest(".pdf-outer-card");
        card
          .querySelectorAll(".pdf-toggle-btn")
          .forEach((b) => b.classList.remove("active"));
        card
          .querySelectorAll(".pdf-pane")
          .forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        card.querySelector("#" + paneId).classList.add("active");
      }

      // ===================== TABS + INIT =====================
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((x) => x.classList.remove("active"));
          t.classList.add("active");
          state.tab = t.dataset.tab;
          renderPanel();
          renderPdfSection();
        });
      });

      renderPanel();
      renderPdfSection();
    </script>
  </body>
</html>
