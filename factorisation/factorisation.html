<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factorisation — Espace Interactif</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap");

      :root {
        --bg: #0a0a14;
        --panel: #12121f;
        --card: #161628;
        --border: #1e1e3a;
        --accent: #ff6b6b;
        --green: #00f5c3;
        --red: #ff6b6b;
        --yellow: #ffd93d;
        --purple: #a78bfa;
        --orange: #ff9f43;
        --blue: #54a0ff;
        --text: #eeeeff;
        --muted: #6b6b9a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Lexend", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* === HEADER === */
      header {
        text-align: center;
        padding: 24px 16px 10px;
        position: relative;
      }
      header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          rgba(255, 107, 107, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .back-btn {
        position: absolute;
        left: 16px;
        top: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        transition: color 0.2s;
        z-index: 2;
      }
      .back-btn:hover {
        color: var(--text);
      }
      header h1 {
        font-size: clamp(1.4rem, 3.5vw, 2rem);
        font-weight: 900;
        letter-spacing: -1px;
        background: linear-gradient(
          135deg,
          var(--red),
          var(--orange),
          var(--yellow)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      header p {
        color: var(--muted);
        font-size: 0.82rem;
        margin-top: 4px;
      }

      /* === TABS === */
      .tabs-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px 20px;
        justify-content: center;
        align-items: center;
      }
      .tab {
        flex-shrink: 0;
        padding: 9px 18px;
        border-radius: 30px;
        border: 1.5px solid transparent;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-family: "Lexend", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      .tab:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
      }
      .tab.active {
        background: rgba(255, 107, 107, 0.15);
        border-color: rgba(255, 107, 107, 0.5);
        box-shadow: 0 0 12px rgba(255, 107, 107, 0.18);
        color: var(--red);
      }

      /* === PANEL === */
      .panel-wrap {
        max-width: 860px;
        width: 100%;
        margin: 0 auto;
        padding: 0 14px 20px;
      }
      #panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* === PDF SECTION === */
      #pdf-section {
        max-width: 860px;
        width: 100%;
        margin: 0 auto;
        padding: 0 14px 48px;
      }
      .pdf-outer-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px 20px;
      }
      .pdf-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .pdf-header-title {
        font-family: "Lexend", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
      }
      .pdf-header-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .pdf-toggle-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .pdf-toggle-btn {
        padding: 7px 20px;
        border-radius: 30px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "Lexend", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .pdf-toggle-btn:hover {
        border-color: rgba(255, 107, 107, 0.4);
        color: var(--text);
      }
      .pdf-toggle-btn.active {
        background: rgba(255, 107, 107, 0.15);
        border-color: rgba(255, 107, 107, 0.5);
        color: var(--text);
      }
      .pdf-pane {
        display: none;
      }
      .pdf-pane.active {
        display: block;
      }
      .pdf-embed {
        width: 100%;
        height: 540px;
        border: none;
        border-radius: 10px;
        display: block;
      }
      .pdf-fallback {
        display: block;
        margin-top: 10px;
        text-align: center;
        font-size: 0.78rem;
        color: var(--muted);
        text-decoration: none;
      }
      .pdf-fallback:hover {
        color: var(--text);
      }

      /* === CARDS === */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
      }
      .card-title {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      /* === SLIDERS === */
      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .slider-label {
        font-family: "Space Mono", monospace;
        font-size: 0.75rem;
        width: 28px;
        color: var(--muted);
      }
      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        background: var(--border);
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #ffffff;
        border: 3px solid var(--accent);
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.4);
        cursor: grab;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 14px rgba(255, 107, 107, 0.6);
      }
      input[type="range"]::-webkit-slider-thumb:active {
        cursor: grabbing;
        transform: scale(1.1);
        background: #ffe0e0;
      }
      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        border: 3px solid var(--accent);
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.4);
        cursor: grab;
      }
      input[type="range"]::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: var(--border);
      }
      .slider-val {
        font-family: "Space Mono", monospace;
        font-size: 0.75rem;
        width: 30px;
        text-align: right;
        color: var(--text);
      }

      /* === EXPRESSION DISPLAY === */
      .expr-box {
        text-align: center;
        padding: 20px 16px;
        font-family: "Space Mono", monospace;
        font-size: 1.5rem;
        font-weight: 700;
        background: rgba(255, 107, 107, 0.04);
        border: 1px solid rgba(255, 107, 107, 0.12);
        border-radius: 14px;
        letter-spacing: 1px;
        line-height: 1.8;
      }
      .expr-box .c-r {
        color: var(--red);
      }
      .expr-box .c-g {
        color: var(--green);
      }
      .expr-box .c-y {
        color: var(--yellow);
      }
      .expr-box .c-p {
        color: var(--purple);
      }
      .expr-box .c-o {
        color: var(--orange);
      }
      .expr-box .c-b {
        color: var(--blue);
      }
      .expr-box .c-m {
        color: var(--muted);
      }
      .expr-box .op {
        color: var(--muted);
        margin: 0 3px;
      }
      .expr-box sup {
        font-size: 0.7em;
      }

      .arrow-down {
        text-align: center;
        color: var(--accent);
        font-size: 1.3rem;
        padding: 2px 0;
        opacity: 0.6;
      }

      /* === STEPS === */
      .steps-wrap {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .step {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        margin-bottom: 0;
        transition:
          max-height 0.45s ease,
          opacity 0.4s ease,
          margin 0.3s ease,
          padding 0.3s ease;
        padding-top: 0;
        padding-bottom: 0;
      }
      .step.visible {
        max-height: 250px;
        opacity: 1;
        margin-bottom: 10px;
        padding: 12px 16px;
      }
      .step-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .step-num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 900;
        flex-shrink: 0;
      }
      .step-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text);
      }
      .step-body {
        font-family: "Space Mono", monospace;
        font-size: 0.92rem;
        line-height: 1.6;
        color: rgba(220, 220, 255, 0.9);
      }
      .step-body .c-r {
        color: var(--red);
      }
      .step-body .c-g {
        color: var(--green);
      }
      .step-body .c-y {
        color: var(--yellow);
      }
      .step-body .c-p {
        color: var(--purple);
      }
      .step-body .c-o {
        color: var(--orange);
      }
      .step-body .c-b {
        color: var(--blue);
      }
      .step-body sup {
        font-size: 0.7em;
      }

      /* === BUTTONS === */
      .btn-step {
        display: block;
        width: 100%;
        padding: 12px;
        border-radius: 11px;
        border: 1px solid rgba(255, 107, 107, 0.3);
        background: rgba(255, 107, 107, 0.08);
        color: var(--red);
        font-family: "Lexend", sans-serif;
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 6px;
      }
      .btn-step:hover {
        background: rgba(255, 107, 107, 0.16);
        transform: translateY(-1px);
      }
      .btn-reset {
        border-color: rgba(167, 139, 250, 0.3);
        background: rgba(167, 139, 250, 0.08);
        color: var(--purple);
      }
      .btn-reset:hover {
        background: rgba(167, 139, 250, 0.16);
      }

      /* === MODE TOGGLE === */
      .mode-row {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .mode-btn {
        flex: 1;
        padding: 10px 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "Lexend", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: rgba(255, 107, 107, 0.12);
        border-color: rgba(255, 107, 107, 0.35);
        color: var(--accent);
      }
      .mode-btn:hover:not(.active) {
        border-color: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      /* === TYPE BUTTONS (sub-tabs) === */
      .type-row {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .type-btn {
        flex: 1;
        padding: 10px 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "Space Mono", monospace;
        font-size: 0.78rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .type-btn.active {
        background: rgba(255, 107, 107, 0.12);
        border-color: rgba(255, 107, 107, 0.35);
        color: var(--accent);
      }
      .type-btn:hover:not(.active) {
        color: var(--text);
      }

      /* === EXERCISE === */
      .ex-input-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .ex-input {
        flex: 1;
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: "Space Mono", monospace;
        font-size: 1rem;
        padding: 12px 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .ex-input:focus {
        border-color: var(--accent);
      }
      .ex-check {
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: "Lexend", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: filter 0.2s;
      }
      .ex-check:hover {
        filter: brightness(1.15);
      }

      .ex-choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .ex-choice {
        padding: 14px 10px;
        border-radius: 11px;
        border: 2px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: "Space Mono", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .ex-choice:hover {
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }
      .ex-choice.correct {
        border-color: var(--green);
        background: rgba(0, 245, 195, 0.1);
        color: var(--green);
      }
      .ex-choice.wrong {
        border-color: var(--red);
        background: rgba(255, 107, 107, 0.1);
        color: var(--red);
        opacity: 0.6;
      }

      .ex-feedback {
        margin-top: 10px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.88rem;
        font-weight: 600;
        text-align: center;
        transition: all 0.3s;
      }
      .ex-feedback.ok {
        background: rgba(0, 245, 195, 0.08);
        border: 1px solid rgba(0, 245, 195, 0.3);
        color: var(--green);
      }
      .ex-feedback.ko {
        background: rgba(255, 107, 107, 0.08);
        border: 1px solid rgba(255, 107, 107, 0.3);
        color: var(--red);
      }

      .score-bar {
        display: flex;
        justify-content: center;
        gap: 16px;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .score-bar .streak {
        color: var(--orange);
      }
      .score-bar .total {
        color: var(--green);
      }

      /* === NAV ARROWS === */
      .nav-row {
        display: flex;
        gap: 8px;
      }
      .nav-btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "Lexend", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .nav-btn:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.15);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* === RULE CARD === */
      .rule-card {
        background: rgba(167, 139, 250, 0.06);
        border: 1px solid rgba(167, 139, 250, 0.18);
        border-radius: 12px;
        padding: 14px 18px;
      }
      .rule-card .card-title {
        color: var(--purple);
      }
      .rule-card .formula {
        font-family: "Space Mono", monospace;
        font-size: 1rem;
        text-align: center;
        color: var(--purple);
        font-weight: 700;
        padding: 6px 0;
      }
      .rule-card .hint {
        font-size: 0.82rem;
        color: rgba(200, 200, 240, 0.7);
        line-height: 1.6;
      }
      .rule-card .hint span {
        color: var(--accent);
        font-weight: 700;
      }

      /* === GRID === */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      /* === HIGHLIGHT/TAG === */
      .hl-r {
        color: var(--red);
        font-weight: 700;
      }
      .hl-g {
        color: var(--green);
        font-weight: 700;
      }
      .hl-y {
        color: var(--yellow);
        font-weight: 700;
      }
      .hl-p {
        color: var(--purple);
        font-weight: 700;
      }
      .hl-o {
        color: var(--orange);
        font-weight: 700;
      }

      /* === DELTA BADGE === */
      .delta-badge {
        text-align: center;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 700;
        margin-top: 8px;
      }
      .delta-pos {
        background: rgba(0, 245, 195, 0.08);
        border: 1px solid rgba(0, 245, 195, 0.25);
        color: var(--green);
      }
      .delta-zero {
        background: rgba(255, 217, 61, 0.08);
        border: 1px solid rgba(255, 217, 61, 0.25);
        color: var(--yellow);
      }
      .delta-neg {
        background: rgba(255, 107, 107, 0.08);
        border: 1px solid rgba(255, 107, 107, 0.25);
        color: var(--red);
      }

      /* === TERM BLOCKS (quadrinomes) === */
      .term-blocks {
        display: flex;
        gap: 6px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 12px 0;
      }
      .term-block {
        padding: 10px 16px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--card);
        font-family: "Space Mono", monospace;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }
      .term-block:hover {
        border-color: rgba(255, 255, 255, 0.2);
      }
      .term-block.sel-a {
        border-color: var(--green);
        background: rgba(0, 245, 195, 0.1);
        color: var(--green);
      }
      .term-block.sel-b {
        border-color: var(--yellow);
        background: rgba(255, 217, 61, 0.1);
        color: var(--yellow);
      }

      @media (max-width: 600px) {
        .expr-box {
          font-size: 1.15rem;
          padding: 14px 10px;
        }
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
        .ex-choices {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <a href="../theory.html" class="back-btn">← Retour</a>
      <h1>🔢 Factorisation</h1>
      <p>Développe, factorise, simplifie — pas à pas</p>
    </header>

    <nav class="tabs-bar">
      <button class="tab active" data-tab="distributivite">
        ✖️ Distributivité
      </button>
      <button class="tab" data-tab="puissances">⚡ Puissances</button>
      <button class="tab" data-tab="facteur">🔢 Facteur commun</button>
      <button class="tab" data-tab="identites">⭐ Identités</button>
      <button class="tab" data-tab="binomes">🔗 Binômes</button>
      <button class="tab" data-tab="trinomes">📐 Trinômes</button>
      <button class="tab" data-tab="quadrinomes">🧩 Quadrinômes</button>
    </nav>

    <div class="panel-wrap">
      <div id="panel"></div>
    </div>

    <div id="pdf-section"></div>

    <script>
      // ===================== STATE =====================
      const state = {
        tab: "distributivite",
        distributivite: {
          a: 2,
          b: 3,
          c: 4,
          dir: "dev",
          step: 0,
          mode: "demo",
          ex: null,
          answered: false,
          score: { ok: 0, total: 0, streak: 0 },
        },
        puissances: { x: 2, n: 3, m: 2 },
        facteur: {
          level: 0,
          step: 0,
          mode: "demo",
          ex: null,
          answered: false,
          score: { ok: 0, total: 0, streak: 0 },
        },
        identites: {
          a: 3,
          b: 2,
          type: "carre_plus",
          step: 0,
          mode: "demo",
          ex: null,
          answered: false,
          score: { ok: 0, total: 0, streak: 0 },
        },
        binomes: {
          a: 3,
          b: 2,
          k: 2,
          n: 4,
          step: 0,
          tech: "diff_carres",
          signType: "minus",
        },
        trinomes: {
          a: 1,
          b: -5,
          c: 6,
          step: 0,
          mode: "demo",
          ex: null,
          answered: false,
          score: { ok: 0, total: 0, streak: 0 },
        },
        quadrinomes: { level: 0, step: 0 },
      };

      // ===================== HELPERS =====================
      function slider(id, label, val, min, max, step, color, onChange) {
        const row = document.createElement("div");
        row.className = "slider-row";
        const dec = step < 1 ? 1 : 0;
        row.innerHTML = `
    <span class="slider-label">${label}</span>
    <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="accent-color:${color}">
    <span class="slider-val" id="${id}_val">${parseFloat(val).toFixed(dec)}</span>`;
        const input = row.querySelector("input");
        const valEl = row.querySelector(".slider-val");
        input.addEventListener("input", () => {
          valEl.textContent = parseFloat(input.value).toFixed(dec);
          onChange(parseFloat(input.value));
        });
        input.addEventListener("change", () => renderPanel());
        return row;
      }

      function card(title, html) {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `<div class="card-title">${title}</div>${html}`;
        return c;
      }

      function ruleCard(title, html) {
        const c = document.createElement("div");
        c.className = "rule-card";
        c.innerHTML = `<div class="card-title">${title}</div>${html}`;
        return c;
      }

      function buildSteps(steps, current, onNext, onReset) {
        const w = document.createElement("div");
        w.className = "steps-wrap";
        steps.forEach((s, i) => {
          const el = document.createElement("div");
          el.className = "step" + (i <= current ? " visible" : "");
          el.innerHTML = `
      <div class="step-header">
        <div class="step-num">${i + 1}</div>
        <div class="step-title">${s.title}</div>
      </div>
      <div class="step-body">${s.body}</div>`;
          w.appendChild(el);
        });
        if (current < steps.length - 1) {
          const b = document.createElement("button");
          b.className = "btn-step";
          b.textContent = "Étape suivante →";
          b.onclick = onNext;
          w.appendChild(b);
        } else {
          const b = document.createElement("button");
          b.className = "btn-step btn-reset";
          b.textContent = "↺ Recommencer les étapes";
          b.onclick = onReset;
          w.appendChild(b);
        }
        return w;
      }

      const S = (n) => (n >= 0 ? "+" : "−");
      const A = (n) => Math.abs(n);
      const F = (n) => parseFloat(n.toFixed(2));
      const signed = (n) => (n >= 0 ? `+${n}` : `−${A(n)}`);
      const signedSp = (n) => (n >= 0 ? `+ ${n}` : `− ${A(n)}`);

      function fmtCoef(n, v) {
        if (n === 0) return "0";
        if (!v) return n.toString();
        if (n === 1) return v;
        if (n === -1) return `−${v}`;
        return `${n}${v}`;
      }

      function randInt(a, b) {
        return a + Math.floor(Math.random() * (b - a + 1));
      }
      function randChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      // ===================== RENDER PANEL =====================
      function renderPanel() {
        const panel = document.getElementById("panel");
        panel.innerHTML = "";
        const t = state.tab;
        if (t === "distributivite") renderDistributivite(panel);
        else if (t === "puissances") renderPuissances(panel);
        else if (t === "facteur") renderFacteur(panel);
        else if (t === "identites") renderIdentites(panel);
        else if (t === "binomes") renderBinomes(panel);
        else if (t === "trinomes") renderTrinomes(panel);
        else if (t === "quadrinomes") renderQuadrinomes(panel);
      }

      // ===================== TAB 1: DISTRIBUTIVITÉ =====================
      function renderDistributivite(panel) {
        const st = state.distributivite;
        const { a, b, c, dir, step, mode } = st;

        // Mode toggle
        const modeEl = document.createElement("div");
        modeEl.className = "mode-row";
        modeEl.innerHTML = `<button class="mode-btn ${mode === "demo" ? "active" : ""}" data-m="demo">📖 Démonstration</button>
    <button class="mode-btn ${mode === "exercice" ? "active" : ""}" data-m="exercice">✏️ À toi !</button>`;
        modeEl.querySelectorAll(".mode-btn").forEach(
          (b) =>
            (b.onclick = () => {
              st.mode = b.dataset.m;
              if (b.dataset.m === "exercice") genDistEx();
              st.step = 0;
              renderPanel();
            }),
        );
        panel.appendChild(modeEl);

        if (mode === "demo") {
          // Direction toggle
          const dirEl = document.createElement("div");
          dirEl.className = "type-row";
          dirEl.innerHTML = `<button class="type-btn ${dir === "dev" ? "active" : ""}" data-d="dev">→ Développer</button>
      <button class="type-btn ${dir === "fact" ? "active" : ""}" data-d="fact">← Factoriser</button>`;
          dirEl.querySelectorAll(".type-btn").forEach(
            (b) =>
              (b.onclick = () => {
                st.dir = b.dataset.d;
                st.step = 0;
                renderPanel();
              }),
          );
          panel.appendChild(dirEl);

          // Sliders
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;
          ctrl.appendChild(
            slider("d_a", "a", a, -6, 6, 1, "#ff6b6b", (v) => {
              st.a = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("d_b", "b", b, -8, 8, 1, "#00f5c3", (v) => {
              st.b = v;
              st.step = 0;
            }),
          );
          ctrl.appendChild(
            slider("d_c", "c", c, -8, 8, 1, "#ffd93d", (v) => {
              st.c = v;
              st.step = 0;
            }),
          );
          panel.appendChild(ctrl);

          const ab = a * b,
            ac = a * c,
            total = ab + ac;

          if (dir === "dev") {
            // Expression
            const exEl = document.createElement("div");
            exEl.className = "expr-box";
            exEl.innerHTML = `<span class="c-r">${a}</span> × ( <span class="c-g">${b}</span> <span class="op">${S(c)}</span> <span class="c-y">${A(c)}</span> )`;
            panel.appendChild(exEl);

            // Steps
            const steps = [
              {
                title: "On distribue le facteur",
                body: `On multiplie <span class="c-r">${a}</span> par chaque terme dans la parenthèse.`,
              },
              {
                title: "On effectue les multiplications",
                body: `<span class="c-r">${a}</span> × <span class="c-g">${b}</span> <span class="op">=</span> <span class="c-g">${ab}</span> &nbsp;&nbsp;et&nbsp;&nbsp; <span class="c-r">${a}</span> × <span class="c-y">${c < 0 ? "(" + c + ")" : c}</span> <span class="op">=</span> <span class="c-y">${ac}</span>`,
              },
              {
                title: "Résultat développé",
                body: `<span style="font-size:1.15rem;">${fmtCoef(a, "")}<span class="c-r"></span> × (<span class="c-g">${b}</span> ${signedSp(c)}) = <span class="c-g">${ab}</span> ${signedSp(ac)} = <span class="c-p" style="font-size:1.3rem;">${total}</span></span>`,
              },
            ];
            panel.appendChild(
              buildSteps(
                steps,
                step,
                () => {
                  st.step++;
                  renderPanel();
                },
                () => {
                  st.step = 0;
                  renderPanel();
                },
              ),
            );
          } else {
            // Factorise: show ab + ac → a(b + c)
            const exEl = document.createElement("div");
            exEl.className = "expr-box";
            exEl.innerHTML = `<span class="c-g">${ab}</span> <span class="op">${S(ac)}</span> <span class="c-y">${A(ac)}</span>`;
            panel.appendChild(exEl);

            const steps = [
              {
                title: "Identifier le facteur commun",
                body: `Les deux termes <span class="c-g">${ab}</span> et <span class="c-y">${ac}</span> sont divisibles par <span class="c-r">${a}</span>.`,
              },
              {
                title: "Diviser chaque terme",
                body: `<span class="c-g">${ab}</span> ÷ <span class="c-r">${a}</span> = <span class="c-g">${b}</span> &nbsp;&nbsp;et&nbsp;&nbsp; <span class="c-y">${ac}</span> ÷ <span class="c-r">${a}</span> = <span class="c-y">${c}</span>`,
              },
              {
                title: "Forme factorisée",
                body: `<span style="font-size:1.15rem;"><span class="c-r">${a}</span> × ( <span class="c-g">${b}</span> ${signedSp(c)} ) = <span class="c-p" style="font-size:1.3rem;">${total}</span></span>`,
              },
            ];
            panel.appendChild(
              buildSteps(
                steps,
                step,
                () => {
                  st.step++;
                  renderPanel();
                },
                () => {
                  st.step = 0;
                  renderPanel();
                },
              ),
            );
          }

          // Rule
          panel.appendChild(
            ruleCard(
              "💡 RÈGLE",
              `<div class="formula">a × (b + c) = a×b + a×c</div>
      <p class="hint">On <span>distribue</span> (multiplie) le facteur devant la parenthèse par <span>chaque terme</span> à l'intérieur.<br><br>↔ Inversement, si deux termes ont un <span>facteur commun</span>, on peut le "<span>sortir</span>" devant une parenthèse.</p>`,
            ),
          );
        } else {
          // EXERCICE MODE
          const sc = st.score;
          const ex = st.ex;
          if (!ex) {
            genDistEx();
            renderPanel();
            return;
          }

          panel.appendChild(scoreBar(sc));

          const q = document.createElement("div");
          q.className = "card";
          q.innerHTML = `<div class="card-title">✏️ EXERCICE</div>
      <p style="font-size:0.9rem;color:var(--text);margin-bottom:8px;">${ex.question}</p>
      <div class="expr-box" style="font-size:1.3rem;">${ex.display}</div>`;
          panel.appendChild(q);

          if (!st.answered) {
            const row = document.createElement("div");
            row.className = "ex-input-row";
            row.innerHTML = `<input class="ex-input" id="ex_ans" type="number" placeholder="Ta réponse…" autofocus>
        <button class="ex-check" id="ex_btn">Vérifier ✓</button>`;
            panel.appendChild(row);
            setTimeout(() => {
              const inp = document.getElementById("ex_ans");
              const btn = document.getElementById("ex_btn");
              if (!inp || !btn) return;
              const check = () => {
                const v = parseFloat(inp.value);
                if (isNaN(v)) return;
                st.answered = true;
                sc.total++;
                if (v === ex.answer) {
                  sc.ok++;
                  sc.streak++;
                } else {
                  sc.streak = 0;
                }
                renderPanel();
              };
              btn.onclick = check;
              inp.addEventListener("keydown", (e) => {
                if (e.key === "Enter") check();
              });
            }, 50);
          } else {
            const ok =
              st.ex.answer ===
                parseFloat(document.getElementById("ex_ans")?.value) ||
              sc.streak > 0 ||
              sc.ok === sc.total;
            // Re-derive correctness
            const fb = document.createElement("div");
            // Check if last answer was correct based on streak change
            const wasCorrect =
              sc.streak > 0 || (sc.ok === sc.total && sc.total > 0);
            fb.className = "ex-feedback " + (wasCorrect ? "ok" : "ko");
            fb.innerHTML = wasCorrect
              ? `✅ Bravo ! La réponse est bien <strong>${ex.answer}</strong>`
              : `❌ La bonne réponse était <strong>${ex.answer}</strong>. ${ex.hint || ""}`;
            panel.appendChild(fb);

            const nb = document.createElement("button");
            nb.className = "btn-step";
            nb.textContent = "Exercice suivant →";
            nb.onclick = () => {
              genDistEx();
              st.answered = false;
              renderPanel();
            };
            panel.appendChild(nb);
          }
        }
      }

      function genDistEx() {
        const st = state.distributivite;
        let a = randInt(2, 7) * (Math.random() > 0.3 ? 1 : -1);
        let b = randInt(1, 9) * (Math.random() > 0.4 ? 1 : -1);
        let c = randInt(1, 9) * (Math.random() > 0.4 ? 1 : -1);
        if (a === 0) a = 2;
        const dev = Math.random() > 0.5;
        if (dev) {
          st.ex = {
            question: "Développe et calcule :",
            display: `<span class="c-r">${a}</span> × ( <span class="c-g">${b}</span> <span class="op">${S(c)}</span> <span class="c-y">${A(c)}</span> )`,
            answer: a * (b + c),
            hint: `${a} × (${b} + ${c}) = ${a}×${b} + ${a}×${c} = ${a * b} + ${a * c} = ${a * (b + c)}`,
          };
        } else {
          const ab = a * b,
            ac = a * c;
          st.ex = {
            question: `Calcule : ${ab} ${signedSp(ac)} = ?`,
            display: `<span class="c-g">${ab}</span> <span class="op">${S(ac)}</span> <span class="c-y">${A(ac)}</span>`,
            answer: ab + ac,
            hint: `${ab} ${signedSp(ac)} = ${ab + ac}`,
          };
        }
        st.answered = false;
      }

      function scoreBar(sc) {
        const el = document.createElement("div");
        el.className = "score-bar";
        el.innerHTML = `<span class="streak">🔥 Série : ${sc.streak}</span>
    <span class="total">✅ ${sc.ok} / ${sc.total}</span>`;
        return el;
      }

      // ===================== TAB 2: PUISSANCES =====================
      function renderPuissances(panel) {
        const { x, n, m } = state.puissances;
        const st = state.puissances;

        ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>`;

          slider("p_x", "x", x, 2, 10, 1, "#ff6b6b", (v) => {
            st.x = v;
          }),
        );
        ctrl.appendChild(
          slider("p_n", "n", n, 0, 6, 1, "#00f5c3", (v) => {
            st.n = v;
          }),

        ctrl.appendChild(
          slider("p_m", "m", m, 0, 6, 1, "#ffd93d", (v) => {
            st.m = v;
          }),
        );
        panel.appendChild(ctrl);

        const pow = (base, exp) => Math.pow(base, exp);
        const sup = (e) => `<sup>${e}</sup>`;

        const rules = [
          {
            name: "Produit de puissances",
            formula: `x${sup("n")} × x${sup("m")} = x${sup("n+m")}`,
            example: `${x}${sup(n)} × ${x}${sup(m)} = ${x}${sup(n + m)} = <span class="c-p">${pow(x, n + m)}</span>`,
            detail: `${pow(x, n)} × ${pow(x, m)} = ${pow(x, n + m)}`,
            color: "var(--red)",
          },
          {
            name: "Quotient de puissances",
            formula: `x${sup("n")} ÷ x${sup("m")} = x${sup("n−m")}`,
            example:
              n >= m
                ? `${x}${sup(n)} ÷ ${x}${sup(m)} = ${x}${sup(n - m)} = <span class="c-p">${pow(x, n - m)}</span>`
                : `${x}${sup(n)} ÷ ${x}${sup(m)} = ${x}${sup(n - m)} = <span class="c-p">1/${pow(x, m - n)}</span>`,
            detail:
              n >= m
                ? `${pow(x, n)} ÷ ${pow(x, m)} = ${pow(x, n - m)}`
                : `${pow(x, n)} ÷ ${pow(x, m)} = ${F(pow(x, n - m))}`,
            color: "var(--green)",
          },
          {
            name: "Puissance de puissance",
            formula: `(x${sup("n")})${sup("m")} = x${sup("n×m")}`,
            example: `(${x}${sup(n)})${sup(m)} = ${x}${sup(n * m)} = <span class="c-p">${pow(x, n * m)}</span>`,
            detail: `(${pow(x, n)})${sup(m)} = ${pow(x, n * m)}`,
            color: "var(--yellow)",
          },
          {
            name: "Exposant 0",
            formula: `x${sup("0")} = 1`,
            example: `${x}${sup(0)} = <span class="c-p">1</span>`,
            detail: `N'importe quel nombre (≠0) à la puissance 0 vaut 1`,
            color: "var(--purple)",
          },
          {
            name: "Exposant 1",
            formula: `x${sup("1")} = x`,
            example: `${x}${sup(1)} = <span class="c-p">${x}</span>`,
            detail: `Un nombre à la puissance 1 reste lui-même`,
            color: "var(--orange)",
          },
          {
            name: "Exposant négatif",
            formula: `x${sup("−n")} = 1 / x${sup("n")}`,
            example: `${x}${sup("−" + n)} = 1 / ${x}${sup(n)} = <span class="c-p">${n === 0 ? 1 : F(1 / pow(x, n))}</span>`,
            detail: `1 / ${pow(x, n)} = ${n === 0 ? 1 : F(1 / pow(x, n))}`,
            color: "var(--blue)",
          },
        ];

        const grid = document.createElement("div");
        grid.className = "grid-2";
        rules.forEach((r) => {
          const c = document.createElement("div");
          c.className = "card";
          c.innerHTML = `
      <div class="card-title" style="color:${r.color}">${r.name}</div>
      <div style="font-family:Space Mono;font-size:0.85rem;text-align:center;color:var(--muted);margin-bottom:8px;">${r.formula}</div>
      <div style="font-family:Space Mono;font-size:0.92rem;text-align:center;margin-bottom:6px;">${r.example}</div>
      <div style="font-size:0.72rem;color:var(--muted);text-align:center;">${r.detail}</div>`;
          grid.appendChild(c);
        });
        panel.appendChild(grid);

        panel.appendChild(
          ruleCard(
            "💡 RÉSUMÉ",
            `<p class="hint">
    • x${sup("n")} signifie « x multiplié par lui-même n fois »<br><br>
    • Quand on <span>multiplie</span> des puissances de même base → on <span>additionne</span> les exposants<br>
    • Quand on <span>divise</span> → on <span>soustrait</span> les exposants<br>
    • Puissance de puissance → on <span>multiplie</span> les exposants<br><br>
    • x${sup("0")} = 1 &nbsp;|&nbsp; x${sup("1")} = x &nbsp;|&nbsp; x${sup("−n")} = 1/x${sup("n")}</p>`,
          ),
        );
      }

      // ===================== TAB 5: BINÔMES =====================
      function renderBinomes(panel) {
        const st = state.binomes;
        const { tech, step } = st;

        // ─── Helper: polynomial string for xⁿ±1 factorisation ───
        function buildPoly(deg, altSigns) {
          let parts = [];
          for (let i = deg; i >= 0; i--) {
            const isFirst = i === deg;
            const sign = altSigns ? ((deg - i) % 2 === 0 ? "+" : "−") : "+";
            const term = i === 0 ? "1" : i === 1 ? "x" : `x<sup>${i}</sup>`;
            parts.push({ sign, term, isFirst });
          }
          let str = parts[0].term;
          for (let i = 1; i < parts.length; i++)
            str += ` ${parts[i].sign} ${parts[i].term}`;
          return str;
        }

        // ─── Helper: numeric verification (x=2) ───
        function generateVerif(n, type) {
          const x = 2;
          if (type === "minus") {
            const val = Math.pow(x, n) - 1;
            let sum = 0;
            for (let i = n - 1; i >= 0; i--) sum += Math.pow(x, i);
            return `Pour x = 2 :<br>x<sup>${n}</sup> − 1 = ${Math.pow(x, n)} − 1 = <span class="c-p">${val}</span><br>(x−1)(x<sup>${n - 1}</sup>+…+1) = ${x - 1} × ${sum} = <span class="c-p">${(x - 1) * sum}</span> ✓`;
          } else {
            const val = Math.pow(x, n) + 1;
            let sum = 0;
            for (let i = n - 1; i >= 0; i--) {
              const sign = (n - 1 - i) % 2 === 0 ? 1 : -1;
              sum += sign * Math.pow(x, i);
            }
            return `Pour x = 2 :<br>x<sup>${n}</sup> + 1 = ${Math.pow(x, n)} + 1 = <span class="c-p">${val}</span><br>(x+1)(x<sup>${n - 1}</sup>−…+1) = ${x + 1} × ${sum} = <span class="c-p">${(x + 1) * sum}</span> ✓`;
          }
        }

        techRow.className = "mode-row";
        techRow.style.flexWrap = "wrap";
        techRow.style.gap = "6px";

              renderPanel();
            }),

        panel.appendChild(techRow);

        // ═══════════════════════════════════════════
        // TECHNIQUE 1 — FACTEUR COMMUN
        // ═══════════════════════════════════════════
        if (tech === "fc") {
          const { k, a, b } = st;
          const ctrl = document.createElement("div");
          ctrl.className = "card";
          ctrl.innerHTML = `<div class="card-title">🎮 RÉGLAGES</div>
