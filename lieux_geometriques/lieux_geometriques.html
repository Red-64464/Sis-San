      /* ================================================================
         PERPENDICULAIRES TAB — DRAWING
      ================================================================ */
      function drawPerpendicualairesTab() {
        const { m, b1, b2 } = ST.perpendiculaires;
        const mPerp = Math.abs(m) > 0.01 ? -1 / m : 1000;
        drawFullLine(m, b1, "#38bdf8", 2.5);
        drawFullLine(mPerp, b2, "#a78bfa", 2.5);

        // Right angle symbol at intersection
        if (Math.abs(m) > 0.01) {
          const xi = (b2 - b1) / (m - mPerp);
          const yi = m * xi + b1;
          if (Math.abs(xi) < CX / SC && Math.abs(yi) < CY / SC) {
            const [ipx, ipy] = toC(xi, yi);
            const s = Math.max(9, SC * 0.17);
            const angle1 = Math.atan2(m * SC, -SC); // direction of line 1 on canvas
            const cos1 = Math.cos(angle1),
              sin1 = Math.sin(angle1);
            const cos2 = Math.cos(angle1 + Math.PI / 2),
              sin2 = Math.sin(angle1 + Math.PI / 2);
            CTX.strokeStyle = "rgba(255,211,61,0.7)";
            CTX.lineWidth = 2;
            CTX.setLineDash([]);
            CTX.beginPath();
            CTX.moveTo(ipx + cos1 * s, ipy + sin1 * s);
            CTX.lineTo(ipx + cos1 * s + cos2 * s, ipy + sin1 * s + sin2 * s);
            CTX.lineTo(ipx + cos2 * s, ipy + sin2 * s);
            CTX.stroke();
          }
        }

        CTX.font = `700 ${Math.max(11, SC * 0.2)}px Space Mono, monospace`;
        CTX.textAlign = "left";
        CTX.textBaseline = "top";
        CTX.fillStyle = "#38bdf8";
        CTX.fillText(fmtLine(m, b1), 14, 14);
        const mPerpR = Math.round(mPerp * 100) / 100;
        CTX.fillStyle = "#a78bfa";
        CTX.fillText(fmtLine(mPerpR, b2), 14, 14 + Math.max(16, SC * 0.28));
      }

      /* ================================================================
         PERPENDICULAIRES TAB — PANEL
      ================================================================ */
      function renderPerpendicualairesTab() {
        const { m, b1, b2 } = ST.perpendiculaires;
        const mR = Math.round(m * 100) / 100;
        const mPerp =
          Math.abs(m) > 0.01 ? Math.round((-1 / m) * 100) / 100 : "∞";

        document.getElementById("panel").innerHTML = `
          <div class="theory-card">
            <div class="theory-title">Droites perpendiculaires</div>
            <p>Deux droites sont <b>perpendiculaires</b> si et seulement si le produit de leurs pentes est égal à <b>−1</b> :</p>
            <div style="text-align:center;font-family:'Space Mono',monospace;font-size:0.9rem;padding:10px 12px;margin:10px 0;background:color-mix(in srgb,var(--acc) 8%,transparent);border:1px solid color-mix(in srgb,var(--acc) 25%,transparent);border-radius:8px;color:var(--acc)">
              d &perp; d&prime; &nbsp;&hArr;&nbsp; m<sub>1</sub> &times; m<sub>2</sub> = &minus;1<br>
              <span style="color:var(--muted);font-size:0.82rem">ou&nbsp; m<sub>2</sub> = &minus;1 / m<sub>1</sub></span>
            </div>
          </div>

          <div class="coords-display" style="font-size:1.1rem;letter-spacing:0">
            <span style="color:#38bdf8" id="eq1-perp">${fmtLine(m, b1)}</span><br>
            <span style="color:#a78bfa" id="eq2-perp">${fmtLine(typeof mPerp === "number" ? mPerp : 0, b2)}</span>
          </div>

          <div class="slider-row">
            <label style="color:var(--yellow);min-width:28px">m</label>
            <input type="range" id="sl-prm" min="-4" max="4" step="0.5" value="${mR}">
            <span class="val" style="color:var(--yellow)" id="sl-prm-val">${fmt(mR)}</span>
          </div>
          <div class="slider-row">
            <label style="color:#38bdf8;min-width:28px">b<sub>1</sub></label>
            <input type="range" id="sl-prb1" min="-5" max="5" step="0.5" value="${b1}">
            <span class="val" style="color:#38bdf8" id="sl-prb1-val">${fmt(b1)}</span>
          </div>
          <div class="slider-row">
            <label style="color:#a78bfa;min-width:28px">b<sub>2</sub></label>
            <input type="range" id="sl-prb2" min="-5" max="5" step="0.5" value="${b2}">
            <span class="val" style="color:#a78bfa" id="sl-prb2-val">${fmt(b2)}</span>
          </div>

          <div class="formula-card">
            <div class="formula-label">Calcul de la pente perpendiculaire</div>
            <div class="step-row">
              <div class="step-num">1</div>
              <div class="step-body">Pente (d) : m<sub>1</sub> = <span class="acc" id="v-prm1">${fmt(mR)}</span></div>
            </div>
            <div class="step-row" style="margin-top:8px">
              <div class="step-num">2</div>
              <div class="step-body">m<sub>2</sub> = &minus;1 / m<sub>1</sub> = &minus;1 / <span id="v-prm1b">${fmt(mR)}</span> = <span class="acc" id="v-prm2">${fmt(mPerp)}</span></div>
            </div>
            <div class="formula-result" id="perp-verify">m<sub>1</sub> &times; m<sub>2</sub> = ${Math.abs(m) > 0.01 ? fmt(mR * (typeof mPerp === "number" ? mPerp : 0)) : "—"}</div>
          </div>

          <div class="hint">💡 Le petit carré jaune à l'intersection montre l'angle droit !</div>`;

        document.getElementById("sl-prm").addEventListener("input", (e) => {
          ST.perpendiculaires.m = parseFloat(e.target.value);
          drawAll();
          renderPerpendicualairesTab();
        });
        document.getElementById("sl-prb1").addEventListener("input", (e) => {
          ST.perpendiculaires.b1 = parseFloat(e.target.value);
          drawAll();
          renderPerpendicualairesTab();

          drawPoint(

            yi,

        CTX.textAlign = "left";
        CTX.textBaseline = "top";
        CTX.fillStyle = "#38bdf8";
        CTX.fillText(fmtLine(m1, b1), 14, 14);
        CTX.fillStyle = "#a78bfa";
        CTX.fillText(fmtLine(m2, b2), 14, 14 + Math.max(16, SC * 0.28));

      /* ================================================================
         POINT-DROITE TAB — DRAWING
      ================================================================ */
      function drawPtDroiteTab() {
        const { m, b, P } = ST.ptdroite;
        drawFullLine(m, b, "#38bdf8", 2.5);

        // Foot of perpendicular H
        const mPerp = Math.abs(m) > 0.01 ? -1 / m : 0;
        const bPerp = P.y - mPerp * P.x;
        let hx, hy;
        if (Math.abs(m) < 0.01) {
          hx = P.x;
          hy = b;
        } else {
          hx = (bPerp - b) / (m - mPerp);
          hy = m * hx + b;
        }

        // Dashed perpendicular segment P → H
        const [ppx, ppy] = toC(P.x, P.y);
        const [hpx, hpy] = toC(hx, hy);
        CTX.beginPath();
        CTX.moveTo(ppx, ppy);
        CTX.lineTo(hpx, hpy);
        CTX.strokeStyle = "#ffd93d";
        CTX.lineWidth = 1.8;
        CTX.setLineDash([5, 4]);
        CTX.stroke();
        CTX.setLineDash([]);

        // Right angle at H
        const s = Math.max(8, SC * 0.16);
        const lineAngle = Math.atan2(m * -SC, -SC);
        const perp = lineAngle + Math.PI / 2;
        const cos1 = Math.cos(lineAngle),
          sin1 = Math.sin(lineAngle);
        const cos2 = Math.cos(perp),
          sin2 = Math.sin(perp);
        CTX.strokeStyle = "rgba(255,211,61,0.7)";
        CTX.lineWidth = 2;
        CTX.setLineDash([]);
        CTX.beginPath();
        CTX.moveTo(hpx + cos1 * s, hpy + sin1 * s);
        CTX.lineTo(hpx + cos1 * s + cos2 * s, hpy + sin1 * s + sin2 * s);
        CTX.lineTo(hpx + cos2 * s, hpy + sin2 * s);
        CTX.stroke();

        // Distance label
        const dist = Math.hypot(P.x - hx, P.y - hy);
        const mpx = (ppx + hpx) / 2,
          mpy = (ppy + hpy) / 2;
        CTX.fillStyle = "#ffd93d";
        CTX.font = `700 ${Math.max(10, SC * 0.18)}px Space Mono, monospace`;
        CTX.textAlign = "left";
        CTX.textBaseline = "middle";
        CTX.fillText(`d = ${dist.toFixed(2)}`, mpx + 8, mpy);

        drawPoint(
          hx,
          hy,
          "#4ade80",
          `H(${fmt(Math.round(hx * 100) / 100)} ; ${fmt(Math.round(hy * 100) / 100)})`,
          false,
        );
        drawPoint(P.x, P.y, "#a78bfa", `P(${fmt(P.x)} ; ${fmt(P.y)})`, true);

        CTX.font = `700 ${Math.max(11, SC * 0.2)}px Space Mono, monospace`;
        CTX.fillStyle = "#38bdf8";
        CTX.textAlign = "left";
        CTX.textBaseline = "top";
        CTX.fillText(fmtLine(m, b), 14, 14);
      }

      /* ================================================================
         POINT-DROITE TAB — PANEL
      ================================================================ */
      function renderPtDroiteTab() {
        const { m, b, P } = ST.ptdroite;
        const mR = Math.round(m * 100) / 100,
          bR = Math.round(b * 100) / 100;
        const mPerp = Math.abs(m) > 0.01 ? -1 / m : 0;
        const bPerp = P.y - mPerp * P.x;
        let hx, hy;
        if (Math.abs(m) < 0.01) {
          hx = P.x;
          hy = b;
        } else {
          hx = (bPerp - b) / (m - mPerp);
          hy = m * hx + b;
        }
        const dist = Math.round(Math.hypot(P.x - hx, P.y - hy) * 1000) / 1000;
        const hxR = Math.round(hx * 100) / 100,
          hyR = Math.round(hy * 100) / 100;

        // d = |ax0 + by0 + c| / sqrt(a²+b²) pour ax+by+c=0 → mx - y + b = 0
        const a = mR,
          bCoeff = -1,
          c_ = bR;
        const num = Math.abs(a * P.x + bCoeff * P.y + c_);
        const den = Math.sqrt(a * a + bCoeff * bCoeff);
        const distFormula = Math.round((num / den) * 1000) / 1000;

        document.getElementById("panel").innerHTML = `
          <div class="theory-card">
            <div class="theory-title">Distance d'un point à une droite</div>
            <p>La <b>distance</b> d'un point P à une droite est la longueur du segment <b>PH</b>, où H est le <b>pied de la perpendiculaire</b> abaissée de P sur la droite.</p>
            <div style="text-align:center;font-family:'Space Mono',monospace;font-size:0.82rem;padding:10px 12px;margin:10px 0;background:color-mix(in srgb,var(--acc) 8%,transparent);border:1px solid color-mix(in srgb,var(--acc) 25%,transparent);border-radius:8px;color:var(--acc);line-height:1.8">
              Droite : ax + by + c = 0<br>

            <span class="val" style="color:var(--purple)" id="sl-pdm-val">${fmt(mR)}</span>
          </div>
          <div class="slider-row">
            <label style="color:var(--yellow);min-width:28px">b</label>
            <input type="range" id="sl-pdb" min="-5" max="5" step="0.5" value="${bR}">
            <span class="val" style="color:var(--yellow)" id="sl-pdb-val">${fmt(bR)}</span>
          </div>
          <div class="slider-row">

            <input type="range" id="sl-pdpx" min="-6" max="6" step="0.5" value="${P.x}">
            <span class="val" style="color:var(--acc)" id="sl-pdpx-val">${fmt(P.x)}</span>
          </div>
          <div class="slider-row">
            <label style="color:var(--acc);min-width:40px">y<sub>P</sub></label>
            <input type="range" id="sl-pdpy" min="-6" max="6" step="0.5" value="${P.y}">
            <span class="val" style="color:var(--acc)" id="sl-pdpy-val">${fmt(P.y)}</span>
          </div>

          <div class="divider"></div>

          <div class="formula-card">
            <div class="formula-label">Calcul (forme ax+by+c=0)</div>
            <div class="step-row">
              <div class="step-num">1</div>
              <div class="step-body">
                Droite : <span class="acc">${fmt(mR)}</span>x − y + <span class="yel">${fmt(bR)}</span> = 0<br>
                → a = <span class="acc">${fmt(mR)}</span>, b = −1, c = <span class="yel">${fmt(bR)}</span>
              </div>
            </div>
            <div class="step-row" style="margin-top:8px">
              <div class="step-num">2</div>
              <div class="step-body">
                Numérateur : |<span class="acc">${fmt(mR)}</span> × <span class="pur">${fmt(P.x)}</span> + (−1) × <span class="pur">${fmt(P.y)}</span> + <span class="yel">${fmt(bR)}</span>|
                = <span class="acc" id="pd-num">${fmt(num)}</span>
              </div>
            </div>
            <div class="step-row" style="margin-top:8px">
              <div class="step-num">3</div>

              <div class="step-num">4</div>

      function updatePtDroiteTab() {
        const { m, b, P } = ST.ptdroite;
        const mR = Math.round(m * 100) / 100,
          bR = Math.round(b * 100) / 100;
        const mPerp = Math.abs(m) > 0.01 ? -1 / m : 0;
        const bPerp = P.y - mPerp * P.x;
        let hx, hy;
        if (Math.abs(m) < 0.01) {
          hx = P.x;
          hy = b;
        } else {
          hx = (bPerp - b) / (m - mPerp);
          hy = m * hx + b;
        }
        const dist = Math.round(Math.hypot(P.x - hx, P.y - hy) * 1000) / 1000;
        const a = mR,
          c_ = bR;
        const num = Math.abs(a * P.x - P.y + c_);
        const den = Math.sqrt(a * a + 1);
        const el = (id) => document.getElementById(id);
        if (el("sl-pdpx")) el("sl-pdpx").value = P.x;
        if (el("sl-pdpx-val")) el("sl-pdpx-val").textContent = fmt(P.x);

        if (el("sl-pdpy-val")) el("sl-pdpy-val").textContent = fmt(P.y);
        if (el("pd-live")) el("pd-live").textContent = dist;
        if (el("pd-num")) el("pd-num").textContent = fmt(num);
        if (el("pd-num2")) el("pd-num2").textContent = fmt(num);
        if (el("pd-dist"))
          el("pd-dist").textContent = Math.round((num / den) * 1000) / 1000;
        if (el("pd-result"))
          el("pd-result").textContent = `d(P, droite) ≈ ${dist}`;
      }

      /* ================================================================
         CERCLE TAB — DRAWING
      ================================================================ */
      function drawCercleTab() {
        const { cx, cy, r, P } = ST.cercle;
        const [ccpx, ccpy] = toC(cx, cy);

        // Circle
        CTX.beginPath();
        CTX.arc(ccpx, ccpy, r * SC, 0, Math.PI * 2);
        CTX.strokeStyle = "#38bdf8";
        CTX.lineWidth = 2.5;
        CTX.setLineDash([]);
        CTX.stroke();

        // Radius to P
        const [ppx, ppy] = toC(P.x, P.y);
        CTX.beginPath();
        CTX.moveTo(ccpx, ccpy);
        CTX.lineTo(ppx, ppy);
        CTX.strokeStyle = "rgba(255,211,61,0.6)";
        CTX.lineWidth = 1.8;
        CTX.setLineDash([4, 3]);
        CTX.stroke();
        CTX.setLineDash([]);

        // Radius label
        const dist = Math.sqrt((P.x - cx) ** 2 + (P.y - cy) ** 2);
        const mpx2 = (ccpx + ppx) / 2,
          mpy2 = (ccpy + ppy) / 2;
        CTX.fillStyle = "#ffd93d";
        CTX.font = `600 ${Math.max(10, SC * 0.18)}px Space Mono, monospace`;
        CTX.textAlign = "center";
        CTX.textBaseline = "bottom";
        CTX.fillText(`r = ${r.toFixed(1)}`, mpx2, mpy2 - 4);

        // Check on/in/out
        const onCircle = Math.abs(dist - r) < 0.15;
        const insideCircle = dist < r - 0.15;
        const pColor = onCircle
          ? "#4ade80"
          : insideCircle
            ? "#ff9f43"
            : "#a78bfa";

        drawPoint(cx, cy, "#38bdf8", `C(${fmt(cx)} ; ${fmt(cy)})`, true);
        drawPoint(P.x, P.y, pColor, `P(${fmt(P.x)} ; ${fmt(P.y)})`, false);
      }

              <div class="step-body">
                (x<sub>P</sub> &minus; a)&sup2; + (y<sub>P</sub> &minus; b)&sup2;<br>
                = (<span class="pur">${fmt(P.x)}</span> &minus; <span class="acc">${fmt(cxR)}</span>)&sup2; + (<span class="pur">${fmt(P.y)}</span> &minus; <span class="acc">${fmt(cyR)}</span>)&sup2;<br>
                = <span class="acc" id="c-lhs">${fmt(lhsP)}</span>
              </div>
            </div>
            <div class="step-row" style="margin-top:8px">
              <div class="step-num">2</div>
              <div class="step-body">
                r² = (<span class="acc">${fmt(rR)}</span>)&sup2; = <span class="acc" id="c-r2">${fmt(r2)}</span>
              </div>
            </div>
            <div class="formula-result" id="c-pos">P est ${position}</div>
          </div>

          <div class="hint">💡 Fais glisser <b style="color:#38bdf8">C</b> et <b style="color:var(--purple)">P</b> sur le repère. La couleur de P change selon sa position !</div>`;

        document.getElementById("sl-ca").addEventListener("input", (e) => {
          ST.cercle.cx = parseFloat(e.target.value);
          drawAll();
          renderCercleTab();
        });
        document.getElementById("sl-cb").addEventListener("input", (e) => {
          ST.cercle.cy = parseFloat(e.target.value);
          drawAll();
          renderCercleTab();
        });
        document.getElementById("sl-cr").addEventListener("input", (e) => {
          ST.cercle.r = parseFloat(e.target.value);
          drawAll();
          renderCercleTab();
        });
        document.getElementById("sl-cpx").addEventListener("input", (e) => {
          ST.cercle.P.x = parseFloat(e.target.value);
          drawAll();
          updateCercleTab();
        });
        document.getElementById("sl-cpy").addEventListener("input", (e) => {
          ST.cercle.P.y = parseFloat(e.target.value);
          drawAll();
          updateCercleTab();
        });
      }

      function updateCercleTab() {
        const { cx, cy, r, P } = ST.cercle;
        const cxR = Math.round(cx * 100) / 100,
          cyR = Math.round(cy * 100) / 100,
          rR = Math.round(r * 100) / 100;
        const lhsP =
          Math.round(((P.x - cx) ** 2 + (P.y - cy) ** 2) * 100) / 100;
        const r2 = Math.round(r * r * 100) / 100;
        const dist = Math.sqrt((P.x - cx) ** 2 + (P.y - cy) ** 2);
        const position =
          Math.abs(dist - r) < 0.15
            ? "sur le cercle ✅"
            : dist < r
              ? "à l'intérieur 🔵"
              : "à l'extérieur 🟣";
        const el = (id) => document.getElementById(id);
        if (el("sl-cpx")) el("sl-cpx").value = P.x;
        if (el("sl-cpx-val")) el("sl-cpx-val").textContent = fmt(P.x);
        if (el("sl-cpy")) el("sl-cpy").value = P.y;
        if (el("sl-cpy-val")) el("sl-cpy-val").textContent = fmt(P.y);
        if (el("c-lhs")) el("c-lhs").textContent = fmt(lhsP);
        if (el("c-pos")) el("c-pos").textContent = `P est ${position}`;
      }

      /* ================================================================
         PDF SYSTEM
      ================================================================ */
      const PDF_MAP = {
        repere: {
          slide: "pdfs/Le%20Rep%C3%A8re/Slide.pdf",
          synth: "pdfs/Le%20Rep%C3%A8re/Synth%C3%A8se.pdf",
        },
        distance: {
          slide: "pdfs/Distance%20entre%20deux%20points/SLIDE.pdf",
          synth: "pdfs/Distance%20entre%20deux%20points/Synth%C3%A8se.pdf",
        },
        milieu: {
          synth: "pdfs/Milieu%20d%27un%20segment/Synth%C3%A8se.pdf",
        },
        droite: {
          synth: "pdfs/L%27%C3%A9quation%20d%27une%20droite/Synth%C3%A8se.pdf",
        },
        pente: {
          synth: "pdfs/La%20pente%20d%27une%20droite/Synth%C3%A8se.pdf",
        },
        paralleles: {
          synth: "pdfs/les%20droites%20parall%C3%A8les/Synth%C3%A8se.pdf",
        },
        perpendiculaires: {
          synth: "pdfs/les%20droites%20perpendiculaires/Synth%C3%A8se.pdf",
        },
        intersection: {
          synth: "pdfs/intersection%20de%20deux%20droites/Synth%C3%A8se.pdf",
        },
        ptdroite: {
          synth:
            "pdfs/distance%20entre%20un%20point%20et%20une%20droite/Synth%C3%A8se.pdf",
        },
        cercle: {
          synth: "pdfs/L%27%C3%A9quation%20d%27un%20cercle/Synth%C3%A8se.pdf",
        },
      };

      function renderPdfSection() {
        const sec = document.getElementById("pdf-section");
        const pdfs = PDF_MAP[ST.tab];
        if (!pdfs) {
          sec.innerHTML = "";
          return;
        }

        const tabs = [];
        if (pdfs.slide)
          tabs.push({ id: "pdf-slide", label: "🎬 Slides", src: pdfs.slide });
        if (pdfs.synth)
          tabs.push({ id: "pdf-synth", label: "📋 Synthèse", src: pdfs.synth });
        if (pdfs.correction)
          tabs.push({
            id: "pdf-correction",
            label: "📝 Correction",
            src: pdfs.correction,
          });

        const btnHtml = tabs
          .map(
            (t, i) =>
              `<button class="pdf-toggle-btn${i === 0 ? " active" : ""}" onclick="pdfSwitch(this,'${t.id}')">${t.label}</button>`,
          )
          .join("");
        const paneHtml = tabs
          .map(
            (t, i) =>
              `<div class="pdf-pane${i === 0 ? " active" : ""}" id="${t.id}">
            <embed src="${t.src}" type="application/pdf" class="pdf-embed">
            <a href="${t.src}" target="_blank" class="pdf-fallback">🔗 Ouvrir en plein écran</a>
          </div>`,
          )
          .join("");

        sec.innerHTML = `
          <div class="pdf-outer-card">
            <div class="pdf-header">
              <span class="pdf-header-title">📄 Documents du chapitre</span>
              <div class="pdf-header-line"></div>
            </div>
            <div class="pdf-toggle-row">${btnHtml}</div>
            ${paneHtml}
          </div>`;
      }

      function pdfSwitch(btn, paneId) {
        const card = btn.closest(".pdf-outer-card");
        card
          .querySelectorAll(".pdf-toggle-btn")
          .forEach((b) => b.classList.remove("active"));
        card
          .querySelectorAll(".pdf-pane")
          .forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        card.querySelector("#" + paneId).classList.add("active");
      }

      /* ================================================================
         DRAG SYSTEM
      ================================================================ */
      let drag = null;

      function getPointer(e) {
        const rect = CVS.getBoundingClientRect();
        if (e.touches) {
          return [
            e.touches[0].clientX - rect.left,
            e.touches[0].clientY - rect.top,
          ];
        }
        return [e.clientX - rect.left, e.clientY - rect.top];
      }

      function hitTest(px, py) {
        const EPS = 14;
        let pts = [];
        if (ST.tab === "repere") {
          pts = [{ key: "P", pt: ST.P }];
        } else if (ST.tab === "droite") {
          pts = [
            {
              key: "PD",
              pt: {
                x: ST.droite.xp,
                y: ST.droite.m * ST.droite.xp + ST.droite.b,
              },
            },
          ];
        } else if (ST.tab === "pente") {
          pts = [
            { key: "PA", pt: ST.pente.A },
            { key: "PB", pt: ST.pente.B },
          ];
        } else if (ST.tab === "ptdroite") {
          pts = [{ key: "PP", pt: ST.ptdroite.P }];
        } else if (ST.tab === "cercle") {
          pts = [
            { key: "CC", pt: { x: ST.cercle.cx, y: ST.cercle.cy } },
            { key: "CP", pt: ST.cercle.P },
          ];
        } else if (ST.tab === "distance" || ST.tab === "milieu") {
          pts = [
            { key: "A", pt: ST.A },
            { key: "B", pt: ST.B },
          ];
        }
        for (const { key, pt } of pts) {
          const [cpx, cpy] = toC(pt.x, pt.y);
          if (Math.hypot(px - cpx, py - cpy) < EPS) return key;
        }
        return null;
      }

      function onPointerDown(e) {
        const [mx, my] = getPointer(e);
        const hit = hitTest(mx, my);
        if (hit) {
          drag = hit;
          CVS.classList.add("drag-cursor");
          e.preventDefault();
        }
      }

      function onPointerMove(e) {
        if (!drag) {
          // Change cursor on hover
          const [mx, my] = getPointer(e);
          CVS.style.cursor = hitTest(mx, my) ? "grab" : "default";
          return;
        }
        e.preventDefault();
        const [mx, my] = getPointer(e);
        const [wx, wy] = toW(mx, my);
        const sx = Math.max(-8, Math.min(8, snap(wx)));
        const sy = Math.max(-6, Math.min(6, snap(wy)));

        if (drag === "P") {
          ST.P.x = sx;
          ST.P.y = sy;
        } else if (drag === "PD") {
          ST.droite.xp = sx;
        } else if (drag === "PA") {
          ST.pente.A.x = sx;
          ST.pente.A.y = sy;
        } else if (drag === "PB") {
          ST.pente.B.x = sx;
          ST.pente.B.y = sy;
        } else if (drag === "PP") {
          ST.ptdroite.P.x = sx;
          ST.ptdroite.P.y = sy;
        } else if (drag === "CC") {
          ST.cercle.cx = sx;
          ST.cercle.cy = sy;
        } else if (drag === "CP") {
          ST.cercle.P.x = sx;
          ST.cercle.P.y = sy;
        } else if (drag === "A") {
          ST.A.x = sx;
          ST.A.y = sy;
        } else if (drag === "B") {
          ST.B.x = sx;
          ST.B.y = sy;
        }

        drawAll();
        if (ST.tab === "repere") updateCoordsPanel();
        else if (ST.tab === "distance") updateDistanceTab();
        else if (ST.tab === "milieu") updateMilieuTab();
        else if (ST.tab === "droite") updateDroiteTab();
        else if (ST.tab === "pente") updatePenteTab();
        else if (ST.tab === "ptdroite") updatePtDroiteTab();
        else if (ST.tab === "cercle") updateCercleTab();
      }

      function onPointerUp() {
        drag = null;
        CVS.classList.remove("drag-cursor");
      }

      CVS.addEventListener("mousedown", onPointerDown);
      CVS.addEventListener("mousemove", onPointerMove);
      CVS.addEventListener("mouseup", onPointerUp);
      CVS.addEventListener("mouseleave", onPointerUp);
      CVS.addEventListener("touchstart", onPointerDown, { passive: false });
      CVS.addEventListener("touchmove", onPointerMove, { passive: false });
      CVS.addEventListener("touchend", onPointerUp);

      /* ================================================================
         MODE & TAB SWITCHING
      ================================================================ */
      function setMode(mode) {
        ST.mode = mode;
        drawAll();
        renderPanel();
      }

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          ST.tab = btn.dataset.tab;
          drawAll();
          renderPanel();
        });
      });

      /* ================================================================
         INIT
      ================================================================ */
      resize();
      renderPanel();
    </script>
  </body>
</html>
